<!DOCTYPE html><html lang="ja"><head><meta charset="UTF-8"><meta name="viewport" content="width=device-width,initial-scale=1.0,viewport-fit=cover"><title>G-SPOT管理システム Ver63</title><link rel="manifest" href="manifest.json"><meta name="theme-color" content="#f5f5f7"><style>
:root{--bg:#f5f5f7;--card:#fff;--text:#111827;--sub:#6b7280;--line:#e5e7eb;--blue:#007aff;--red:#ef4444;--green:#16a34a;--gold:#b8871f;--shadow:0 10px 30px rgba(0,0,0,.07);--radius:22px}*{box-sizing:border-box;-webkit-tap-highlight-color:transparent}body{margin:0;background:var(--bg);color:var(--text);font-family:-apple-system,BlinkMacSystemFont,"Hiragino Sans","Yu Gothic",sans-serif;font-weight:600}header{position:sticky;top:0;z-index:20;background:rgba(245,245,247,.94);backdrop-filter:blur(18px);border-bottom:1px solid rgba(0,0,0,.06);padding:18px 18px 12px}h1{font-size:24px;margin:0;letter-spacing:-.03em}header p{margin:4px 0 0;color:var(--sub);font-size:12px}.wrap{max-width:1280px;margin:auto;padding:12px 12px 70px}.menu{display:grid;grid-template-columns:repeat(6,1fr);gap:7px;padding:2px 0 12px;position:sticky;top:76px;z-index:19;background:var(--bg)}button{border:0;border-radius:16px;padding:11px 10px;background:#fff;color:#111827;box-shadow:0 4px 16px rgba(0,0,0,.06);font-weight:800;font-size:13px}button.active,.primary{background:var(--blue);color:#fff}.good{background:var(--green);color:#fff}.danger{background:var(--red);color:#fff}.sub{background:#eef2ff;color:#1d4ed8}.gold{background:linear-gradient(135deg,#b8871f,#e6c36a);color:#fff}.card{background:var(--card);border:1px solid rgba(0,0,0,.05);border-radius:var(--radius);padding:18px;margin-bottom:14px;box-shadow:var(--shadow)}h2{font-size:22px;margin:0 0 14px}h3{font-size:16px;margin:14px 0 8px}label{display:block;font-size:12px;color:var(--sub);margin:8px 0 5px}input,select,textarea{width:100%;border:1px solid var(--line);border-radius:16px;padding:13px;font-size:16px;background:#fff;color:#111827;font-weight:650}textarea{height:210px;font-family:ui-monospace,SFMono-Regular,Menlo,monospace;font-weight:500;line-height:1.55}.out{height:420px}.row{display:grid;grid-template-columns:1fr 1fr;gap:10px}.row3{display:grid;grid-template-columns:1fr 1fr 1fr;gap:10px}.grid2{display:grid;grid-template-columns:1fr 1fr;gap:10px}.note{font-size:12px;color:var(--sub);line-height:1.5}.hidden{display:none!important}.stats{display:grid;grid-template-columns:repeat(4,1fr);gap:10px}.stat{background:#f9fafb;border-radius:18px;padding:14px;text-align:center}.stat span{display:block;font-size:12px;color:var(--sub)}.stat b{font-size:28px}.item{background:#fff;border:1px solid var(--line);border-radius:18px;padding:12px;margin-bottom:10px}.badge{display:inline-block;border-radius:999px;padding:4px 9px;font-size:11px;margin:2px;background:#f3f4f6}.ok{background:#dcfce7;color:#166534}.warn{background:#fff7ed;color:#9a3412}.ng{background:#fee2e2;color:#991b1b}.tableWrap{overflow:auto;border:1px solid var(--line);border-radius:18px;background:#fff;max-height:72vh}table{border-collapse:separate;border-spacing:0;width:max-content;min-width:100%}th,td{border-right:1px solid var(--line);border-bottom:1px solid var(--line);padding:7px 8px;text-align:center;font-size:12px;white-space:nowrap}th{background:#fafafa}.name{position:sticky;left:0;background:#fff!important;text-align:left!important;z-index:3;min-width:96px;font-weight:900}.sat{background:#eaf3ff!important}.sun{background:#fff0f0!important}.work{background:#dcfce7!important;color:#166534;font-weight:900}.short{background:#fff7ed!important;color:#9a3412;font-weight:900}.photoBox{border:1px dashed #cbd5e1;border-radius:18px;padding:12px;background:#fafafa;text-align:center}.photoBox img{max-width:100%;max-height:260px;border-radius:16px;display:none;margin:auto}@media(max-width:760px){h1{font-size:21px}.wrap{padding:10px 8px 60px}.menu{top:70px;grid-template-columns:repeat(3,1fr)}.menu button{font-size:12px;padding:9px 6px}.row,.row3,.grid2{grid-template-columns:1fr}.stats{grid-template-columns:repeat(2,1fr)}.card{padding:16px;border-radius:20px}}
</style></head><body><header><h1>G-SPOT管理システム</h1><p>Ver63 / 出勤管理そのまま + AI紹介文メーカー</p></header><div class="wrap"><div class="menu"><button id="tab_home" class="active" onclick="showPage('home')">ホーム</button><button id="tab_staff" onclick="showPage('staff')">出勤</button><button id="tab_monthly" onclick="showPage('monthly')">月間表</button><button id="tab_ai" onclick="showPage('ai')">AI書き出し</button><button id="tab_profile" onclick="showPage('profile')">紹介文</button><button id="tab_backup" onclick="showPage('backup')">保存</button></div>
<section id="home" class="page"><div class="card"><h2>ホーム</h2><div class="stats"><div class="stat"><span>登録人数</span><b id="statStaff">0</b></div><div class="stat"><span>新人</span><b id="statNewbie">0</b></div><div class="stat"><span>本日出勤</span><b id="statToday">0</b></div><div class="stat"><span>学習文</span><b id="statLearn">0</b></div></div><p class="note">出勤管理の保存キーは newAppStaffV1 のまま。紹介文メーカーは別キーで保存するため、出勤データを壊しません。</p><div class="grid2"><button class="primary" onclick="showPage('staff')">出勤を登録</button><button class="gold" onclick="showPage('profile')">紹介文を作る</button></div></div></section>
<section id="staff" class="page hidden"><div class="card"><h2>出勤登録</h2><div class="row"><div><label>源氏名</label><input id="name" placeholder="例：いずな"></div><div><label>新人</label><select id="newbie"><option value="0">通常</option><option value="1">新人</option></select></div></div><div class="row"><div><label>開始日</label><input id="start" type="date"></div><div><label>終了日</label><input id="end" type="date"></div></div><div class="row"><div><label>出勤開始</label><select id="timeStart"></select></div><div><label>出勤終了</label><select id="timeEnd"></select></div></div><label>備考</label><textarea id="staffNote" placeholder="出勤に関する備考"></textarea><button class="primary" onclick="addStaff()">登録</button></div><div class="card"><h2>出勤一覧</h2><div id="staffList"></div></div></section>
<section id="monthly" class="page hidden"><div class="card"><h2 id="monthTitle">月間出勤</h2><div class="row"><div><label>表示開始日</label><input id="monthBase" type="date" onchange="renderMonthly()"></div><div><label>表示日数</label><select id="daysCount" onchange="renderMonthly()"><option>31</option><option>30</option><option>14</option><option>7</option></select></div></div><div class="tableWrap" id="monthlyTable"></div></div></section>
<section id="ai" class="page hidden"><div class="card"><h2>AI書き出し</h2><div class="row"><div><label>更新日</label><input id="updateDate" type="date"></div><div><label>日数</label><select id="exportDays"><option>31</option><option>30</option><option>14</option><option>7</option></select></div></div><div class="row"><button class="primary" onclick="generateShiftText()">作成</button><button class="good" onclick="copyId('output')">コピー</button></div><button class="sub" onclick="sendLine()">LINEで送る</button><textarea id="output" class="out"></textarea></div></section>
<section id="profile" class="page hidden"><div class="grid2"><div class="card"><h2>AI紹介文メーカー</h2><div class="photoBox"><input type="file" accept="image/*" onchange="previewPhoto(event)"><img id="photoPreview"><p class="note">写真は端末内プレビュー用。雰囲気タグを入力すると文章に反映します。</p></div><div class="row"><div><label>源氏名</label><input id="pName" placeholder="例：いずな"></div><div><label>年齢</label><input id="pAge" placeholder="例：24"></div></div><div class="row3"><div><label>身長</label><input id="pTall" placeholder="155"></div><div><label>バスト</label><input id="pBust" placeholder="84D"></div><div><label>W/H</label><input id="pWh" placeholder="56/85"></div></div><div class="row"><div><label>前職</label><input id="pJob" placeholder="例：看護師"></div><div><label>タイプ</label><select id="pType"><option>高級感</option><option>清楚系</option><option>可愛い系</option><option>色気系</option><option>癒し系</option><option>新人速報</option><option>小悪魔系</option></select></div></div><label>雰囲気タグ</label><input id="pTags" placeholder="例：色白, 小柄, 愛嬌, はにかむ笑顔"><label>性格・趣味・コメント</label><textarea id="pMemo" placeholder="明るく人懐っこい、料理と旅行が好き…など"></textarea><button class="gold" onclick="generateProfile()">紹介文を生成</button></div><div class="card"><h2>生成結果</h2><div id="checkBadges"></div><textarea id="result" class="out"></textarea><div class="grid2"><button class="good" onclick="copyId('result')">コピー</button><button class="sub" onclick="saveProfileResult()">完成文として保存</button><button onclick="generateProfile()">別パターン</button><button class="sub" onclick="makePrompt()">AI用プロンプト</button></div></div></div><div class="grid2"><div class="card"><h2>学習BOX</h2><p class="note">過去の紹介文・新人速報・店長コメントを貼り付けて保存。次回生成に反映します。</p><div class="row"><div><label>分類</label><select id="lType"><option>高級感</option><option>清楚系</option><option>可愛い系</option><option>色気系</option><option>癒し系</option><option>新人速報</option></select></div><div><label>評価</label><select id="lRate"><option value="5">★★★★★</option><option value="4">★★★★</option><option value="3">★★★</option></select></div></div><textarea id="lText" placeholder="参考文章を貼り付け"></textarea><button class="primary" onclick="addLearn()">学習保存</button></div><div class="card"><h2>NG・表現ローテーション</h2><label>NGワード・避けたい表現</label><textarea id="ngWords"></textarea><div class="row"><div><label>出だし候補</label><textarea id="openers"></textarea></div><div><label>締め候補</label><textarea id="closers"></textarea></div></div><button class="primary" onclick="saveParts()">保存</button></div></div></section>
<section id="backup" class="page hidden"><div class="card"><h2>バックアップ</h2><div class="grid2"><button class="good" onclick="exportBackup()">出勤バックアップ</button><button class="sub" onclick="exportProfileData()">紹介文バックアップ</button></div><label>出勤バックアップ復元</label><input type="file" accept=".json" onchange="importBackup(event)"><label>紹介文バックアップ復元</label><input type="file" accept=".json" onchange="importProfileData(event)"></div><div class="card"><h2>学習文・保存文</h2><div id="learnList"></div><h3>完成文</h3><div id="savedList"></div></div></section></div><script>
const wds=['日','月','火','水','木','金','土'];function el(id){return document.getElementById(id)}function pad(n){return String(n).padStart(2,'0')}function ymd(d){return d.getFullYear()+'-'+pad(d.getMonth()+1)+'-'+pad(d.getDate())}function today(){return ymd(new Date())}function parseDate(s){let a=s.split('-');return new Date(+a[0],+a[1]-1,+a[2])}function esc(s){return String(s??'').replace(/[&<>"']/g,m=>({'&':'&amp;','<':'&lt;','>':'&gt;','"':'&quot;',"'":'&#39;'}[m]))}function get(id){return el(id).value.trim()}function loadFirst(keys){for(let k of keys){try{let raw=localStorage.getItem(k);if(raw){let v=JSON.parse(raw);if(Array.isArray(v))return v}}catch(e){}}return []}let staff=loadFirst(['newAppStaffV1','staffDataStable','staffDataUnifiedV1','managementAppDataV4','staffData']);function saveStaff(){localStorage.setItem('newAppStaffV1',JSON.stringify(staff));renderStats()}function makeTimeOptions(sel,val){sel.innerHTML='';for(let h=0;h<24;h++){for(let m of ['00','30']){let v=pad(h)+':'+m,o=document.createElement('option');o.value=v;o.textContent=(+String(h))+':'+m;sel.appendChild(o)}}sel.value=val||'10:00'}function diffHours(a,b){let A=a.split(':'),B=b.split(':'),s=+A[0]*60+ +A[1],e=+B[0]*60+ +B[1];if(e<s)e+=1440;return Math.max(0,(e-s)/60)}function showPage(id){document.querySelectorAll('.page').forEach(p=>p.classList.add('hidden'));document.querySelectorAll('.menu button').forEach(b=>b.classList.remove('active'));el(id).classList.remove('hidden');el('tab_'+id).classList.add('active');if(id==='staff')renderStaff();if(id==='monthly')renderMonthly();if(id==='backup')renderProfileLists();renderStats()}function addStaff(){let name=get('name');if(!name)return alert('源氏名を入力してください');staff.push({id:Date.now(),name,newbie:el('newbie').value==='1',start:get('start'),end:get('end'),timeStart:get('timeStart'),timeEnd:get('timeEnd'),note:get('staffNote')});['name','staffNote'].forEach(i=>el(i).value='');saveStaff();renderStaff()}function delStaff(id){if(confirm('削除しますか？')){staff=staff.filter(x=>x.id!==id);saveStaff();renderStaff()}}function renderStaff(){el('staffList').innerHTML=staff.length?staff.map(x=>`<div class="item"><b>${esc(x.name)} ${x.newbie?'🆕':''}</b><p class="note">${esc(x.start)}〜${esc(x.end)} / ${esc(x.timeStart)}-${esc(x.timeEnd)} ${x.note?'/ '+esc(x.note):''}</p><button class="danger" onclick="delStaff(${x.id})">削除</button></div>`).join(''):'<p class="note">まだ登録がありません</p>'}function isWork(p,ds){return p.start&&p.end&&ds>=p.start&&ds<=p.end}function dateClass(d){return d.getDay()==0?'sun':d.getDay()==6?'sat':''}function renderMonthly(){let base=parseDate(el('monthBase').value||today()),days=+el('daysCount').value||31;el('monthTitle').textContent=(base.getMonth()+1)+'月出勤';let h='<table><thead><tr><th class="name">源氏名</th>';for(let i=0;i<days;i++){let d=new Date(base);d.setDate(base.getDate()+i);h+=`<th class="${dateClass(d)}">${d.getDate()}<br>${wds[d.getDay()]}</th>`}h+='</tr></thead><tbody>';staff.forEach(p=>{h+=`<tr><td class="name">${esc(p.name)}${p.newbie?' 🆕':''}</td>`;for(let i=0;i<days;i++){let d=new Date(base);d.setDate(base.getDate()+i);let ds=ymd(d),cls=dateClass(d);if(isWork(p,ds)){let hrs=diffHours(p.timeStart,p.timeEnd);h+=`<td class="${cls} ${hrs<=7?'short':'work'}">${esc(p.timeStart)}-${esc(p.timeEnd)}</td>`}else h+=`<td class="${cls}">休</td>`}h+='</tr>'});h+='</tbody></table>';el('monthlyTable').innerHTML=h}function todaysCount(){let ds=today();return staff.filter(p=>isWork(p,ds)).length}function renderStats(){el('statStaff').textContent=staff.length;el('statNewbie').textContent=staff.filter(x=>x.newbie).length;el('statToday').textContent=todaysCount();el('statLearn').textContent=profileDb.learn.length}function generateShiftText(){let base=parseDate(get('updateDate')||today()),days=+get('exportDays')||31,out='【出勤情報】\n';for(let i=0;i<days;i++){let d=new Date(base);d.setDate(base.getDate()+i);let ds=ymd(d),arr=staff.filter(p=>isWork(p,ds));if(arr.length){out+=`\n${d.getMonth()+1}/${d.getDate()}(${wds[d.getDay()]})\n`;arr.forEach(p=>out+=`${p.newbie?'✨':''}${p.name} ${p.timeStart}-${p.timeEnd}\n`)}}el('output').value=out.trim()}function sendLine(){generateShiftText();location.href='https://line.me/R/msg/text/?'+encodeURIComponent(el('output').value)}function copyId(id){navigator.clipboard.writeText(el(id).value||'');alert('コピーしました')}function exportBackup(){let blob=new Blob([JSON.stringify({staff,createdAt:new Date().toISOString()},null,2)],{type:'application/json'});let a=document.createElement('a');a.href=URL.createObjectURL(blob);a.download='gspot_shift_backup.json';a.click()}function importBackup(e){let f=e.target.files[0];if(!f)return;let r=new FileReader();r.onload=()=>{try{let d=JSON.parse(r.result);staff=Array.isArray(d)?d:(d.staff||[]);saveStaff();renderStaff();alert('復元しました')}catch(err){alert('復元できませんでした')}};r.readAsText(f)}
const PKEY='gspot_ai_profile_v63';let profileDb={learn:[],saved:[],ng:['まさに','禁断の果実','同じような文章'],openers:['ふっと目が合った瞬間、心を奪われるような存在感。','上品さと愛らしさを兼ね備えた注目の美女。','柔らかな雰囲気の奥に、確かな色気を感じさせる彼女。','初対面でも自然と惹き込まれる、印象的な笑顔の持ち主。'],closers:['ぜひ一度、その魅力を直接お確かめください。','ご予約はお早めに。きっと忘れられない時間になるはずです。','特別なひと時を、ぜひ彼女とお過ごしください。','今後の人気上昇が期待される注目の存在です。']};function loadProfile(){try{profileDb=Object.assign(profileDb,JSON.parse(localStorage.getItem(PKEY)||'{}'))}catch(e){};renderProfileForm()}function saveProfile(){localStorage.setItem(PKEY,JSON.stringify(profileDb));renderProfileForm();renderStats()}function lines(s){return String(s||'').split(/\n+/).map(x=>x.trim()).filter(Boolean)}function pick(a){return a[Math.floor(Math.random()*a.length)]||''}function previewPhoto(e){let f=e.target.files[0];if(!f)return;let r=new FileReader();r.onload=()=>{el('photoPreview').src=r.result;el('photoPreview').style.display='block'};r.readAsDataURL(f)}function sim(a,b){let A=new Set(String(a).split(/\W+/)),B=new Set(String(b).split(/\W+/));let hit=0;A.forEach(x=>{if(B.has(x))hit++});return A.size?Math.round(hit/Math.max(A.size,B.size)*100):0}function refPhrase(type){let arr=profileDb.learn.filter(x=>x.type===type).sort((a,b)=>b.rate-a.rate);if(!arr.length)arr=profileDb.learn.sort((a,b)=>b.rate-a.rate);if(!arr.length)return '';return pick(arr[0].text.split(/[。\n]/).filter(x=>x.length>15&&x.length<80))}function generateProfile(){let name=get('pName')||'〇〇',age=get('pAge'),type=get('pType'),size=[get('pTall')?'T'+get('pTall'):'',get('pBust')?'B'+get('pBust'):'',get('pWh')?'W/H'+get('pWh'):''].filter(Boolean).join('｜'),tags=get('pTags')||type,job=get('pJob'),memo=get('pMemo')||'自然体で接しやすく、初めての方でも安心してお過ごしいただける雰囲気です。',ref=refPhrase(type);let text=`${type==='新人速報'?'✦✧ G-SPOT土浦店 新人速報 ✧✦\n\n':''}${pick(profileDb.openers)}\n\n【${name}】さん${age?'／'+age+'歳':''}のご紹介です。\n${size?size+'\n\n':''}${tags}という言葉がよく似合う、印象に残る女性です。\n\n${memo}\n\n${job?'前職は'+job+'。その経験から感じられる落ち着きや気配りも、彼女ならではの魅力です。\n\n':''}${ref?'参考にしたい余韻として「'+ref+'」のような魅力も感じさせます。\n\n':''}見た目の美しさだけでなく、会話のしやすさや距離感の近さも魅力。\n一緒に過ごすほどに、また会いたくなる存在感があります。\n\n${pick(profileDb.closers)}`;el('result').value=text;checkProfile(text)}function checkProfile(text){let max=0;profileDb.saved.concat(profileDb.learn).forEach(x=>max=Math.max(max,sim(text,x.text||'')));let ng=profileDb.ng.filter(w=>text.includes(w));el('checkBadges').innerHTML=`<span class="badge ${max>=45?'ng':max>=30?'warn':'ok'}">類似度 ${max}%</span><span class="badge ${ng.length?'ng':'ok'}">NG ${ng.length}件</span>`}function saveProfileResult(){let text=get('result');if(!text)return;profileDb.saved.unshift({id:Date.now(),date:new Date().toLocaleString('ja-JP'),name:get('pName'),type:get('pType'),text});saveProfile();alert('保存しました')}function makePrompt(){el('result').value=`G-SPOT土浦店の女の子紹介文を作成。\n条件：同じ出だし・締めを避ける／高級感と色気／下品すぎない／予約したくなる文章。\n\n源氏名：${get('pName')}\n年齢：${get('pAge')}\nサイズ：T${get('pTall')} B${get('pBust')} W/H${get('pWh')}\n前職：${get('pJob')}\nタイプ：${get('pType')}\n雰囲気：${get('pTags')}\nメモ：${get('pMemo')}\n\n参考文体：\n${profileDb.learn.slice(0,3).map(x=>x.text).join('\n---\n')}`}function addLearn(){let text=get('lText');if(!text)return;profileDb.learn.unshift({id:Date.now(),date:new Date().toLocaleString('ja-JP'),type:get('lType'),rate:+get('lRate'),text});el('lText').value='';saveProfile()}function saveParts(){profileDb.ng=lines(el('ngWords').value);profileDb.openers=lines(el('openers').value);profileDb.closers=lines(el('closers').value);saveProfile()}function renderProfileForm(){if(el('ngWords')){el('ngWords').value=profileDb.ng.join('\n');el('openers').value=profileDb.openers.join('\n');el('closers').value=profileDb.closers.join('\n')}renderProfileLists()}function delLearn(id){profileDb.learn=profileDb.learn.filter(x=>x.id!==id);saveProfile()}function delSaved(id){profileDb.saved=profileDb.saved.filter(x=>x.id!==id);saveProfile()}function renderProfileLists(){if(!el('learnList'))return;el('learnList').innerHTML=profileDb.learn.map(x=>`<div class="item"><b>${esc(x.type)} ★${x.rate}</b><p class="note">${esc(x.date)}</p><p>${esc(x.text).slice(0,180)}</p><button class="danger" onclick="delLearn(${x.id})">削除</button></div>`).join('')||'<p class="note">まだありません</p>';el('savedList').innerHTML=profileDb.saved.map(x=>`<div class="item"><b>${esc(x.name||x.type)}</b><p class="note">${esc(x.date)}</p><textarea>${esc(x.text)}</textarea><button class="danger" onclick="delSaved(${x.id})">削除</button></div>`).join('')||'<p class="note">まだありません</p>'}function exportProfileData(){let blob=new Blob([JSON.stringify(profileDb,null,2)],{type:'application/json'});let a=document.createElement('a');a.href=URL.createObjectURL(blob);a.download='gspot_profile_backup.json';a.click()}function importProfileData(e){let f=e.target.files[0];if(!f)return;let r=new FileReader();r.onload=()=>{try{profileDb=Object.assign(profileDb,JSON.parse(r.result));saveProfile();alert('復元しました')}catch(err){alert('復元できませんでした')}};r.readAsText(f)}function init(){let d=new Date();['start','monthBase','updateDate'].forEach(id=>el(id).value=today());el('end').value=ymd(new Date(d.getFullYear(),d.getMonth(),d.getDate()+30));makeTimeOptions(el('timeStart'),'10:00');makeTimeOptions(el('timeEnd'),'00:00');loadProfile();renderStaff();renderMonthly();renderStats()}if('serviceWorker'in navigator){window.addEventListener('load',()=>navigator.serviceWorker.register('./sw.js').catch(()=>{}))}init();
</script></body></html>
