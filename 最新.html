<!DOCTYPE html>
<html lang="ja">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>出勤・寮 管理アプリ</title>
<style>
body{margin:0;background:#f4f6fb;font-family:-apple-system,BlinkMacSystemFont,"Hiragino Sans","Yu Gothic",sans-serif;color:#111827}
header{background:linear-gradient(135deg,#2563eb,#4f46e5);color:white;padding:16px;position:sticky;top:0;z-index:10}
h1{font-size:20px;margin:0} p{line-height:1.5}
.wrap{padding:12px;max-width:1100px;margin:auto}
.menu{display:grid;grid-template-columns:repeat(2,1fr);gap:8px;margin-bottom:12px}
button{border:0;border-radius:14px;padding:12px;background:white;box-shadow:0 2px 8px rgba(0,0,0,.08);font-weight:700;font-size:14px}
button.active,.primary{background:#2563eb;color:white}.good{background:#16a34a;color:white}.danger{background:#ef4444;color:white}.sub{background:#eef2ff;color:#3730a3}
.card{background:white;border-radius:18px;padding:14px;margin-bottom:12px;box-shadow:0 2px 10px rgba(0,0,0,.08)}
h2{font-size:18px;margin:0 0 10px}
label{display:block;font-size:12px;color:#6b7280;margin:8px 0 4px}
input,select,textarea{width:100%;box-sizing:border-box;border:1px solid #e5e7eb;border-radius:12px;padding:10px;font-size:16px;background:white}
textarea{height:360px;font-family:monospace;line-height:1.55}
.row{display:grid;grid-template-columns:1fr 1fr;gap:10px}
.row3{display:grid;grid-template-columns:1fr 1fr 1fr;gap:8px}
.note{font-size:12px;color:#6b7280}
.hidden{display:none}
.item{border:1px solid #e5e7eb;border-radius:14px;padding:10px;margin-bottom:8px;background:white}
.badge{display:inline-block;border-radius:999px;padding:3px 8px;font-size:11px;font-weight:800;margin-left:5px;background:#fef3c7;color:#92400e}
.tableWrap{overflow:auto;border:1px solid #e5e7eb;border-radius:14px;background:white}
table{border-collapse:collapse;width:max-content;min-width:100%}
th,td{border:1px solid #e5e7eb;padding:6px;text-align:center;font-size:12px;white-space:nowrap}
th.name,td.name{position:sticky;left:0;background:white;z-index:2;min-width:90px;text-align:left;font-weight:800}
th{background:#f9fafb}.sat{background:#dbeafe!important}.sun,.holiday{background:#fee2e2!important}
.green{background:#dcfce7!important;color:#166534;font-weight:900}.orange{background:#ffedd5!important;color:#9a3412;font-weight:900}
.in{background:#dcfce7!important}.out{background:#fee2e2!important}.clean{background:#ede9fe!important}
.stats{display:grid;grid-template-columns:repeat(4,1fr);gap:8px}.stat{text-align:center;background:#f9fafb;border-radius:14px;padding:10px}.stat b{font-size:22px}
@media(max-width:700px){.row,.row3,.stats{grid-template-columns:1fr}}
</style>
</head>
<body>
<header><h1>出勤・寮 管理アプリ</h1><p style="margin:4px 0 0;font-size:12px">出勤管理・寮管理・月間表・31日書き出し・LINE送信</p></header>
<div class="wrap">
<div class="menu">
<button id="tab_home" class="active" onclick="showPage('home')">🏠 ホーム</button>
<button id="tab_staff" onclick="showPage('staff')">📅 出勤</button>
<button id="tab_dorm" onclick="showPage('dorm')">🏢 寮管理</button>
<button id="tab_monthly" onclick="showPage('monthly')">📊 月間表</button>
<button id="tab_ai" onclick="showPage('ai')">🤖 書き出し</button>
</div>

<section id="home" class="page">
<div class="card"><h2>ホーム</h2>
<div class="stats">
<div class="stat"><div class="note">登録人数</div><b id="statStaff">0</b></div>
<div class="stat"><div class="note">新人</div><b id="statNewbie">0</b></div>
<div class="stat"><div class="note">寮部屋</div><b id="statDorm">0</b></div>
<div class="stat"><div class="note">本日出勤</div><b id="statToday">0</b></div>
</div>
<p class="note">このファイルはGitHub Pages用の安定版です。ファイル名を必ず index.html にしてアップロードしてください。</p>
<button class="primary" onclick="showPage('staff')">出勤を登録</button>
<button class="sub" onclick="showPage('dorm')">寮を登録</button>
<button class="good" onclick="showPage('ai')">LINE用に書き出し</button>
</div></section>

<section id="staff" class="page hidden">
<div class="card"><h2>源氏名・出勤登録</h2>
<div class="row"><div><label>源氏名</label><input id="name" placeholder="例：いずな"></div><div><label>新人</label><select id="newbie"><option value="0">通常</option><option value="1">新人</option></select></div></div>
<div class="row"><div><label>開始日</label><input id="start" type="date"></div><div><label>終了日</label><input id="end" type="date"></div></div>
<div class="row"><div><label>出勤開始</label><input id="timeStart" type="time" value="10:00"></div><div><label>出勤終了</label><input id="timeEnd" type="time" value="20:00"></div></div>
<button class="primary" onclick="addStaff()">登録する</button><p class="note">日別変更で特定日だけ時間変更・休みにできます。</p></div>
<div class="card"><h2>出勤登録一覧</h2><div id="staffList"></div></div>
</section>

<section id="dorm" class="page hidden">
<div class="card"><h2>寮管理登録</h2>
<div class="row"><div><label>寮名</label><input id="dormName" placeholder="例：第一寮"></div><div><label>部屋番号</label><input id="roomNo" placeholder="例：101"></div></div>
<div class="row"><div><label>名前/源氏名</label><input id="residentName" placeholder="例：いずな"></div><div><label>状態</label><select id="roomStatus"><option>入寮中</option><option>空室</option><option>予約</option></select></div></div>
<div class="row3"><div><label>入寮日</label><input id="moveIn" type="date"></div><div><label>退寮日</label><input id="moveOut" type="date"></div><div><label>清掃日</label><input id="cleanDate" type="date"></div></div>
<button class="primary" onclick="addDorm()">寮情報を登録</button></div>
<div class="card"><h2>寮一覧</h2><div id="dormList"></div></div>
</section>

<section id="monthly" class="page hidden">
<div class="card"><h2 id="monthTitle">月間表</h2>
<div class="row"><div><label>表示開始日</label><input id="monthBase" type="date" onchange="renderMonthly();renderDormMonthly();"></div><div><label>表示日数</label><select id="daysCount" onchange="renderMonthly();renderDormMonthly();"><option>31</option><option>30</option><option>14</option><option>7</option></select></div></div>
<div class="tableWrap" id="monthlyTable"></div></div>
<div class="card"><h2>寮 月間予定</h2><div class="tableWrap" id="dormMonthlyTable"></div></div>
</section>

<section id="ai" class="page hidden">
<div class="card"><h2>AI書き出し・LINE送信</h2>
<div class="row"><div><label>更新日</label><input id="updateDate" type="date"></div><div><label>日数</label><select id="exportDays"><option>31</option><option>30</option><option>14</option><option>7</option></select></div></div>
<div class="row"><button class="primary" onclick="generateText()">書き出し作成</button><button class="good" onclick="copyText()">コピー</button></div>
<button class="sub" onclick="sendLine()">LINEで送る</button>
<textarea id="output"></textarea></div>
</section>
</div>

<script>
var holidays={"2026-01-01":"元日","2026-01-12":"成人の日","2026-02-11":"建国記念の日","2026-02-23":"天皇誕生日","2026-03-20":"春分の日","2026-04-29":"昭和の日","2026-05-03":"憲法記念日","2026-05-04":"みどりの日","2026-05-05":"こどもの日","2026-05-06":"振替休日","2026-07-20":"海の日","2026-08-11":"山の日","2026-09-21":"敬老の日","2026-09-22":"国民の休日","2026-09-23":"秋分の日","2026-10-12":"スポーツの日","2026-11-03":"文化の日","2026-11-23":"勤労感謝の日"};
var staff=JSON.parse(localStorage.getItem("staffDataStable")||"[]");
var dorms=JSON.parse(localStorage.getItem("dormDataStable")||"[]");
var wds=["日","月","火","水","木","金","土"];
function el(id){return document.getElementById(id)}
function pad(n){return String(n).padStart(2,"0")}
function ymd(d){return d.getFullYear()+"-"+pad(d.getMonth()+1)+"-"+pad(d.getDate())}
function md(d){return (d.getMonth()+1)+"/"+d.getDate()}
function today(){return ymd(new Date())}
function parseDate(s){var a=s.split("-");return new Date(Number(a[0]),Number(a[1])-1,Number(a[2]))}
function save(){localStorage.setItem("staffDataStable",JSON.stringify(staff));localStorage.setItem("dormDataStable",JSON.stringify(dorms));renderStats()}
function dateClass(d){var s=ymd(d);if(holidays[s])return "holiday";if(d.getDay()==0)return "sun";if(d.getDay()==6)return "sat";return ""}
function diffHours(a,b){if(!a||!b)return 0;var A=a.split(":"),B=b.split(":");var s=Number(A[0])*60+Number(A[1]),e=Number(B[0])*60+Number(B[1]);if(e<s)e+=1440;return Math.max(0,(e-s)/60)}
function point(h){if(h<=0)return 0;if(h<=7)return .5;return 1}
function fmt(n){return Number.isInteger(n)?String(n):n.toFixed(1)}
function showPage(id){
 var pages=document.querySelectorAll(".page");for(var i=0;i<pages.length;i++)pages[i].classList.add("hidden");
 var tabs=document.querySelectorAll(".menu button");for(var j=0;j<tabs.length;j++)tabs[j].classList.remove("active");
 el(id).classList.remove("hidden");el("tab_"+id).classList.add("active");
 if(id==="staff")renderStaff(); if(id==="dorm")renderDorm(); if(id==="monthly"){renderMonthly();renderDormMonthly()} if(id==="ai"&&!el("updateDate").value)el("updateDate").value=today();
 renderStats();
}
function init(){
 var d=new Date();el("start").value=today();el("end").value=ymd(new Date(d.getFullYear(),d.getMonth(),d.getDate()+30));el("monthBase").value=today();el("updateDate").value=today();el("moveIn").value=today();el("cleanDate").value=today();
 renderStaff();renderDorm();renderMonthly();renderDormMonthly();renderStats();
}
function renderStats(){el("statStaff").textContent=staff.length;el("statNewbie").textContent=staff.filter(function(x){return x.newbie}).length;el("statDorm").textContent=dorms.length;el("statToday").textContent=totals(today()).real}
function addStaff(){var name=el("name").value.trim();if(!name){alert("源氏名を入力してください");return}staff.push({id:Date.now(),name:name,newbie:el("newbie").value==="1",start:el("start").value,end:el("end").value,timeStart:el("timeStart").value,timeEnd:el("timeEnd").value,overrides:{}});el("name").value="";save();renderStaff();renderMonthly()}
function renderStaff(){var box=el("staffList");box.innerHTML="";if(!staff.length){box.innerHTML='<p class="note">まだ登録がありません。</p>';return}staff.forEach(function(p){var div=document.createElement("div");div.className="item";div.innerHTML="<b>"+p.name+"</b>"+(p.newbie?'<span class=\"badge\">新人</span>':"")+"<div class='note'>"+p.start+"〜"+p.end+" / 基本 "+p.timeStart+"〜"+p.timeEnd+"</div><div class='row3'><button class='sub' onclick='editDay("+p.id+")'>日別変更</button><button onclick='toggleNewbie("+p.id+")'>新人切替</button><button class='danger' onclick='removeStaff("+p.id+")'>削除</button></div>";box.appendChild(div)})}
function toggleNewbie(id){var p=staff.find(function(x){return x.id===id});p.newbie=!p.newbie;save();renderStaff();renderMonthly()}
function removeStaff(id){if(confirm("削除しますか？")){staff=staff.filter(function(x){return x.id!==id});save();renderStaff();renderMonthly()}}
function editDay(id){var p=staff.find(function(x){return x.id===id});var date=prompt("変更する日付 例：2026-06-18",today());if(!date)return;var cur=p.overrides[date]||{};var st=prompt("開始時間。休みの場合は空欄",cur.off?"":(cur.timeStart||p.timeStart));if(st===null)return;if(st===""){p.overrides[date]={off:true};save();renderStaff();renderMonthly();return}var en=prompt("終了時間",cur.timeEnd||p.timeEnd);if(!en)return;p.overrides[date]={timeStart:st,timeEnd:en,off:false};save();renderStaff();renderMonthly()}
function workFor(p,ds){if(ds<p.start||ds>p.end)return null;var ov=p.overrides[ds];if(ov&&ov.off)return null;var st=(ov&&ov.timeStart)?ov.timeStart:p.timeStart;var en=(ov&&ov.timeEnd)?ov.timeEnd:p.timeEnd;var h=diffHours(st,en);if(h<=0)return null;return{hours:h,point:point(h)}}
function totals(ds){var real=0,calc=0,newbies=[];staff.forEach(function(p){var w=workFor(p,ds);if(w){real++;calc+=w.point;if(p.newbie)newbies.push(p.name)}});return{real:real,calc:calc,newbies:newbies}}
function addDorm(){var dn=el("dormName").value.trim(),rn=el("roomNo").value.trim();if(!dn||!rn){alert("寮名と部屋番号を入力してください");return}dorms.push({id:Date.now(),dormName:dn,roomNo:rn,residentName:el("residentName").value.trim(),status:el("roomStatus").value,moveIn:el("moveIn").value,moveOut:el("moveOut").value,cleanDate:el("cleanDate").value});el("dormName").value="";el("roomNo").value="";el("residentName").value="";save();renderDorm();renderDormMonthly()}
function renderDorm(){var box=el("dormList");box.innerHTML="";if(!dorms.length){box.innerHTML='<p class="note">まだ寮登録がありません。</p>';return}dorms.forEach(function(r){var div=document.createElement("div");div.className="item";div.innerHTML="<b>"+r.dormName+" "+r.roomNo+"号室</b><span class='badge'>"+r.status+"</span><div class='note'>名前："+(r.residentName||"-")+" / 入寮："+(r.moveIn||"-")+" / 退寮："+(r.moveOut||"-")+" / 清掃："+(r.cleanDate||"-")+"</div><div class='row3'><button class='sub' onclick='editDorm("+r.id+")'>編集</button><button onclick='toggleRoom("+r.id+")'>空室切替</button><button class='danger' onclick='removeDorm("+r.id+")'>削除</button></div>";box.appendChild(div)})}
function editDorm(id){var r=dorms.find(function(x){return x.id===id});r.dormName=prompt("寮名",r.dormName)||r.dormName;r.roomNo=prompt("部屋番号",r.roomNo)||r.roomNo;r.residentName=prompt("名前/源氏名",r.residentName)||r.residentName;r.moveIn=prompt("入寮日",r.moveIn)||r.moveIn;r.moveOut=prompt("退寮日",r.moveOut)||r.moveOut;r.cleanDate=prompt("清掃日",r.cleanDate)||r.cleanDate;save();renderDorm();renderDormMonthly()}
function toggleRoom(id){var r=dorms.find(function(x){return x.id===id});r.status=r.status==="空室"?"入寮中":"空室";save();renderDorm();renderDormMonthly()}
function removeDorm(id){if(confirm("削除しますか？")){dorms=dorms.filter(function(x){return x.id!==id});save();renderDorm();renderDormMonthly()}}
function renderMonthly(){var base=parseDate(el("monthBase").value||today()),days=Number(el("daysCount").value||31);el("monthTitle").textContent=(base.getMonth()+1)+"月出勤";var html="<table><thead><tr><th class='name' rowspan='2'>源氏名</th>";for(var i=0;i<days;i++){var d=new Date(base);d.setDate(base.getDate()+i);html+="<th class='"+dateClass(d)+"'>"+d.getDate()+"日</th>"}html+="</tr><tr>";for(i=0;i<days;i++){d=new Date(base);d.setDate(base.getDate()+i);html+="<th class='"+dateClass(d)+"'>"+wds[d.getDay()]+"</th>"}html+="</tr></thead><tbody>";staff.forEach(function(p){html+="<tr><td class='name'>"+p.name+(p.newbie?" 🆕":"")+"</td>";for(var i=0;i<days;i++){var d=new Date(base);d.setDate(base.getDate()+i);var ds=ymd(d),w=workFor(p,ds),c=dateClass(d);if(!w)html+="<td class='"+c+"'>-</td>";else{var wc=w.hours>=10?"green":(w.hours<=8?"orange":"");html+="<td class='"+c+" "+wc+"'>"+w.hours.toFixed(1)+"</td>"}}html+="</tr>"});html+="<tr><td class='name'>合計</td>";for(i=0;i<days;i++){d=new Date(base);d.setDate(base.getDate()+i);var t=totals(ymd(d));html+="<td class='"+dateClass(d)+"'><b>"+fmt(t.calc)+"</b><br>("+t.real+")</td>"}html+="</tr></tbody></table>";el("monthlyTable").innerHTML=html}
function renderDormMonthly(){var base=parseDate(el("monthBase").value||today()),days=Number(el("daysCount").value||31);var html="<table><thead><tr><th class='name' rowspan='2'>寮/部屋</th>";for(var i=0;i<days;i++){var d=new Date(base);d.setDate(base.getDate()+i);html+="<th class='"+dateClass(d)+"'>"+d.getDate()+"日</th>"}html+="</tr><tr>";for(i=0;i<days;i++){d=new Date(base);d.setDate(base.getDate()+i);html+="<th class='"+dateClass(d)+"'>"+wds[d.getDay()]+"</th>"}html+="</tr></thead><tbody>";dorms.forEach(function(r){html+="<tr><td class='name'>"+r.dormName+"<br>"+r.roomNo+"</td>";for(var i=0;i<days;i++){var d=new Date(base);d.setDate(base.getDate()+i);var ds=ymd(d),txt="",cl=dateClass(d);if(r.moveIn===ds){txt+="入";cl+=" in"}if(r.moveOut===ds){txt+=(txt?"/":"")+"退";cl+=" out"}if(r.cleanDate===ds){txt+=(txt?"/":"")+"清";cl+=" clean"}html+="<td class='"+cl+"'>"+txt+"</td>"}html+="</tr>"});html+="</tbody></table>";el("dormMonthlyTable").innerHTML=html}
function dormEvents(ds){var ins=[],outs=[],cleans=[];dorms.forEach(function(r){var label=(r.dormName+" "+r.roomNo+"号室 "+(r.residentName||"")).trim();if(r.moveIn===ds)ins.push(label);if(r.moveOut===ds)outs.push(label);if(r.cleanDate===ds)cleans.push(r.dormName+" "+r.roomNo+"号室")});return{ins:ins,outs:outs,cleans:cleans}}
function generateText(){var base=parseDate(el("updateDate").value||today()),days=Number(el("exportDays").value||31);var lines=[md(base)+"更新",""],cur=null;for(var i=0;i<days;i++){var d=new Date(base);d.setDate(base.getDate()+i);var ds=ymd(d);if(cur!==d.getMonth()){cur=d.getMonth();if(lines[lines.length-1]!="")lines.push("");lines.push((d.getMonth()+1)+"月")}var t=totals(ds);lines.push(d.getDate()+"日("+wds[d.getDay()]+") "+fmt(t.calc)+"("+t.real+")")}lines.push("");lines.push("※()内は実際の人数");lines.push("※()外は0.5人計算の人数");lines.push("※10時間以上=1人 / 7時間以下=0.5人");var newNames=staff.filter(function(p){return p.newbie}).map(function(p){return p.name});if(newNames.length){lines.push("");lines.push("【新人】");newNames.forEach(function(n){lines.push(n)})}var dormLines=["","【寮予定】"],has=false;for(i=0;i<days;i++){d=new Date(base);d.setDate(base.getDate()+i);var ev=dormEvents(ymd(d));if(ev.ins.length||ev.outs.length||ev.cleans.length){has=true;dormLines.push("");dormLines.push((d.getMonth()+1)+"/"+d.getDate()+"("+wds[d.getDay()]+")");if(ev.ins.length){dormLines.push("入寮予定");ev.ins.forEach(function(x){dormLines.push(x)})}if(ev.outs.length){dormLines.push("退寮予定");ev.outs.forEach(function(x){dormLines.push(x)})}if(ev.cleans.length){dormLines.push("清掃予定");ev.cleans.forEach(function(x){dormLines.push(x)})}}}if(has)lines=lines.concat(dormLines);el("output").value=lines.join("\n")}
function copyText(){if(!el("output").value)generateText();el("output").select();document.execCommand("copy");alert("コピーしました")}
function sendLine(){if(!el("output").value)generateText();location.href="https://line.me/R/msg/text/?"+encodeURIComponent(el("output").value)}
init();
</script>
</body>
</html>
