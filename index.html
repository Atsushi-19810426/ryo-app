<!doctype html>
<html lang="ja">
<head>
<meta charset="utf-8">
<meta name="viewport" content="width=device-width,initial-scale=1,viewport-fit=cover">
<meta name="apple-mobile-web-app-capable" content="yes">
<meta name="apple-mobile-web-app-title" content="寮管理">
<meta name="theme-color" content="#0f172a">
<link rel="manifest" href="manifest.json">
<title>寮管理 iPhone完全版</title>
<style>
:root{--bg:#f4f6fb;--card:#fff;--ink:#111827;--muted:#6b7280;--line:#e5e7eb;--blue:#2563eb;--green:#16a34a;--orange:#f97316;--red:#dc2626;--dark:#0f172a}
*{box-sizing:border-box}body{margin:0;background:var(--bg);font-family:-apple-system,BlinkMacSystemFont,"Hiragino Sans","Yu Gothic",sans-serif;color:var(--ink);padding-bottom:88px}
header{position:sticky;top:0;z-index:10;background:linear-gradient(135deg,#0f172a,#1d4ed8);color:white;padding:18px 16px 14px;border-bottom-left-radius:22px;border-bottom-right-radius:22px;box-shadow:0 8px 22px rgba(15,23,42,.18)}
h1{font-size:22px;margin:0 0 4px}.sub{font-size:12px;opacity:.86}.wrap{padding:14px}.grid{display:grid;grid-template-columns:1fr 1fr;gap:10px}.card{background:var(--card);border-radius:18px;padding:14px;box-shadow:0 5px 18px rgba(15,23,42,.08);border:1px solid rgba(229,231,235,.8)}
.stat{font-size:28px;font-weight:800}.label{font-size:12px;color:var(--muted);margin-top:4px}.btn{border:0;border-radius:14px;padding:12px 14px;font-weight:700;font-size:15px;background:var(--dark);color:white;width:100%;min-height:46px}.btn.blue{background:var(--blue)}.btn.green{background:var(--green)}.btn.orange{background:var(--orange)}.btn.red{background:var(--red)}.btn.light{background:#eef2ff;color:#1e40af}
.row{display:flex;gap:8px}.row>*{flex:1}input,select,textarea{width:100%;border:1px solid var(--line);border-radius:14px;padding:12px;font-size:16px;background:white}label{display:block;font-size:12px;color:var(--muted);font-weight:700;margin:10px 0 5px}
.section{display:none}.section.active{display:block}.item{background:white;border-radius:16px;margin:10px 0;padding:13px;border-left:6px solid #2563eb;box-shadow:0 3px 12px rgba(15,23,42,.07)}
.item.hotel{border-left-color:#f97316}.item.done{opacity:.68}.title{font-weight:800;font-size:16px}.meta{font-size:13px;color:#4b5563;line-height:1.55;margin-top:5px;white-space:pre-wrap}.pill{display:inline-block;border-radius:999px;padding:4px 8px;font-size:11px;font-weight:800;margin-right:4px;background:#e0ecff;color:#1d4ed8}.pill.orange{background:#ffedd5;color:#c2410c}.pill.green{background:#dcfce7;color:#15803d}.pill.red{background:#fee2e2;color:#b91c1c}
nav{position:fixed;bottom:0;left:0;right:0;background:white;border-top:1px solid var(--line);display:grid;grid-template-columns:repeat(5,1fr);padding:7px 4px calc(7px + env(safe-area-inset-bottom));z-index:20}
nav button{background:transparent;border:0;color:#6b7280;font-size:10px;font-weight:700;padding:5px 0}nav button b{display:block;font-size:20px;line-height:22px}nav button.active{color:#2563eb}
textarea.report{height:220px;line-height:1.55}.small{font-size:12px;color:var(--muted);line-height:1.5}.empty{text-align:center;color:var(--muted);padding:24px 0}.topspace{height:8px}
</style>
</head>
<body>
<header><h1>🏠 寮管理</h1><div class="sub" id="todayText">本日の状況を確認</div></header>
<div class="wrap">
<section id="home" class="section active">
<div class="grid"><div class="card"><div class="stat" id="stIn">0</div><div class="label">本日入寮</div></div><div class="card"><div class="stat" id="stOut">0</div><div class="label">本日退寮</div></div><div class="card"><div class="stat" id="stClean">0</div><div class="label">清掃予定</div></div><div class="card"><div class="stat" id="stStay">0</div><div class="label">入居・宿泊中</div></div></div>
<div class="topspace"></div><button class="btn blue" onclick="show('add')">＋ 予定を追加</button><div class="topspace"></div><button class="btn light" onclick="makeReport();show('report')">本日のAI書き出しを作成</button><h3>本日の予定</h3><div id="todayList"></div>
</section>
<section id="add" class="section"><div class="card"><h3>予定追加</h3>
<label>種別</label><select id="type"><option>アパート</option><option>ビジホ</option></select>
<label>物件名／ビジホ名</label><input id="property" placeholder="例：○○アパート / ○○ホテル">
<label>部屋番号</label><input id="room" placeholder="例：101 / 305">
<label>名前</label><input id="name" placeholder="例：山田">
<div class="row"><div><label>入寮日</label><input id="inDate" type="date"></div><div><label>退寮日</label><input id="outDate" type="date"></div></div>
<label>清掃状況</label><select id="clean"><option>未清掃</option><option>清掃予定</option><option>清掃中</option><option>完了</option><option>不要</option></select>
<label>状態</label><select id="status"><option>入居中</option><option>予約</option><option>退寮予定</option><option>空室</option></select>
<label>備考</label><textarea id="note" placeholder="連絡事項・時間など"></textarea>
<div class="topspace"></div><button class="btn green" onclick="saveItem()">保存</button><div class="topspace"></div><button class="btn" onclick="clearForm()">入力クリア</button></div></section>
<section id="list" class="section"><div class="row"><button class="btn light" onclick="filter='all';render()">全て</button><button class="btn light" onclick="filter='アパート';render()">アパート</button><button class="btn light" onclick="filter='ビジホ';render()">ビジホ</button></div><div class="topspace"></div><input id="search" placeholder="物件名・部屋番号・名前で検索" oninput="render()"><div id="allList"></div></section>
<section id="report" class="section"><div class="card"><h3>本日のAI書き出し</h3><textarea class="report" id="reportText"></textarea><div class="topspace"></div><button class="btn blue" onclick="copyReport()">コピー</button></div></section>
<section id="data" class="section"><div class="card"><h3>データ管理</h3><p class="small">データはこのiPhone内のブラウザに保存されます。機種変更やSafariのデータ削除前にバックアップしてください。</p><button class="btn blue" onclick="exportData()">バックアップを書き出し</button><div class="topspace"></div><label>バックアップ読み込み</label><input type="file" id="importFile" accept=".json" onchange="importData(event)"><div class="topspace"></div><button class="btn red" onclick="resetAll()">全データ削除</button></div></section>
</div>
<nav><button onclick="show('home')" class="active"><b>🏠</b>ホーム</button><button onclick="show('add')"><b>＋</b>追加</button><button onclick="show('list')"><b>📋</b>一覧</button><button onclick="makeReport();show('report')"><b>📝</b>書出</button><button onclick="show('data')"><b>⚙️</b>管理</button></nav>
<script>
let items = JSON.parse(localStorage.getItem('dormItemsV3')||'[]');let filter='all';let editId=null;const $=id=>document.getElementById(id);
function today(){return new Date().toISOString().slice(0,10)}
function jp(d){if(!d)return "";let x=new Date(d+"T00:00:00");return (x.getMonth()+1)+"/"+x.getDate()}
function show(id){document.querySelectorAll('.section').forEach(s=>s.classList.remove('active'));$(id).classList.add('active');document.querySelectorAll('nav button').forEach(b=>b.classList.remove('active'));[...document.querySelectorAll('nav button')].find(b=>b.getAttribute('onclick')?.includes("'"+id+"'"))?.classList.add('active');render()}
function persist(){localStorage.setItem('dormItemsV3',JSON.stringify(items))}
function saveItem(){let obj={id:editId||Date.now(),type:$('type').value,property:$('property').value.trim(),room:$('room').value.trim(),name:$('name').value.trim(),inDate:$('inDate').value,outDate:$('outDate').value,clean:$('clean').value,status:$('status').value,note:$('note').value.trim()};if(!obj.property||!obj.room){alert('物件名と部屋番号は必須です');return}if(editId){items=items.map(x=>x.id===editId?obj:x)}else{items.push(obj)}persist();clearForm();show('home')}
function clearForm(){editId=null;['property','room','name','inDate','outDate','note'].forEach(id=>$(id).value='');$('type').value='アパート';$('clean').value='未清掃';$('status').value='入居中'}
function edit(id){let x=items.find(i=>i.id===id);if(!x)return;editId=id;['type','property','room','name','inDate','outDate','clean','status','note'].forEach(k=>$(k).value=x[k]||'');show('add')}
function del(id){if(confirm('削除しますか？')){items=items.filter(x=>x.id!==id);persist();render()}}
function badge(x){return `<span class="pill ${x.type==='ビジホ'?'orange':''}">${x.type}</span><span class="pill ${x.clean==='完了'?'green':(x.clean==='未清掃'||x.clean==='清掃予定'?'red':'')}">${x.clean}</span>`}
function card(x){return `<div class="item ${x.type==='ビジホ'?'hotel':''} ${x.clean==='完了'?'done':''}"><div class="title">${badge(x)} ${x.property} ${x.room}</div><div class="meta">名前：${x.name||'-'}\n入寮：${jp(x.inDate)||'-'}　退寮：${jp(x.outDate)||'-'}\n状態：${x.status||'-'}${x.note?'\n備考：'+x.note:''}</div><div class="row" style="margin-top:10px"><button class="btn light" onclick="edit(${x.id})">編集</button><button class="btn red" onclick="del(${x.id})">削除</button></div></div>`}
function render(){let t=today();$('todayText').textContent=new Date().toLocaleDateString('ja-JP',{month:'numeric',day:'numeric',weekday:'short'})+" の状況";let inToday=items.filter(x=>x.inDate===t),outToday=items.filter(x=>x.outDate===t),cleanToday=items.filter(x=>(x.inDate===t||x.outDate===t)&&x.clean!=='完了'&&x.clean!=='不要');$('stIn').textContent=inToday.length;$('stOut').textContent=outToday.length;$('stClean').textContent=cleanToday.length;$('stStay').textContent=items.filter(x=>x.status==='入居中'||x.status==='予約').length;let todayItems=[...new Map([...inToday,...outToday,...cleanToday].map(x=>[x.id,x])).values()];$('todayList').innerHTML=todayItems.length?todayItems.map(card).join(''):'<div class="empty">本日の予定はありません</div>';let q=($('search')?.value||'').toLowerCase();let list=items.filter(x=>(filter==='all'||x.type===filter)&&(x.property+x.room+x.name+x.note).toLowerCase().includes(q)).sort((a,b)=>(a.inDate||'9999').localeCompare(b.inDate||'9999'));$('allList').innerHTML=list.length?list.map(card).join(''):'<div class="empty">データがありません</div>'}
function makeReport(){let t=today(),d=jp(t);let ins=items.filter(x=>x.inDate===t),outs=items.filter(x=>x.outDate===t),cleans=items.filter(x=>(x.inDate===t||x.outDate===t)&&x.clean!=='完了'&&x.clean!=='不要');let line=arr=>arr.length?arr.map(x=>`${x.property} ${x.room}　${x.name||''}${x.note?'（'+x.note+'）':''}`).join('\n'):'なし';$('reportText').value=`${d} 寮状況\n\n【入寮予定】\n${line(ins)}\n\n【退寮予定】\n${line(outs)}\n\n【清掃予定】\n${line(cleans)}\n\n【注意】\n未清掃・重複・備考欄を確認してください。`}
function copyReport(){navigator.clipboard.writeText($('reportText').value).then(()=>alert('コピーしました'))}
function exportData(){let blob=new Blob([JSON.stringify(items,null,2)],{type:'application/json'});let a=document.createElement('a');a.href=URL.createObjectURL(blob);a.download='寮管理バックアップ.json';a.click()}
function importData(e){let f=e.target.files[0];if(!f)return;let r=new FileReader();r.onload=()=>{try{items=JSON.parse(r.result);persist();alert('読み込み完了');render()}catch{alert('読み込み失敗')}};r.readAsText(f)}
function resetAll(){if(confirm('全データを削除しますか？')){items=[];persist();render()}}
if('serviceWorker' in navigator){navigator.serviceWorker.register('./sw.js').catch(()=>{})}render();
</script>
</body></html>
