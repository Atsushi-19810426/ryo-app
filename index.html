<!doctype html>
<html lang="ja">
<head>
<meta charset="utf-8">
<meta name="viewport" content="width=device-width,initial-scale=1,maximum-scale=1,user-scalable=no,viewport-fit=cover">
<meta name="theme-color" content="#2563eb">
<meta name="apple-mobile-web-app-capable" content="yes">
<meta name="apple-mobile-web-app-title" content="寮管理">
<meta name="apple-mobile-web-app-status-bar-style" content="default">
<link rel="apple-touch-icon" href="icon-192.png">
<link rel="manifest" href="manifest.json">
<title>寮管理 iPhone</title>
<style>
:root{--bg:#f4f6fb;--card:#fff;--text:#101828;--muted:#667085;--line:#e4e7ec;--blue:#2563eb;--green:#16a34a;--red:#dc2626;--yellow:#f59e0b;--purple:#7c3aed;--safeBottom:env(safe-area-inset-bottom)}
*{box-sizing:border-box;-webkit-tap-highlight-color:transparent}html,body{margin:0;height:100%;font-family:-apple-system,BlinkMacSystemFont,"Hiragino Sans","Yu Gothic",sans-serif;background:var(--bg);color:var(--text);font-size:16px}body{overscroll-behavior:none}.app{min-height:100dvh;padding:calc(env(safe-area-inset-top) + 10px) 14px calc(88px + var(--safeBottom));max-width:480px;margin:0 auto}.top{position:sticky;top:0;z-index:5;margin:-10px -14px 12px;padding:calc(env(safe-area-inset-top) + 10px) 14px 12px;background:rgba(244,246,251,.92);backdrop-filter:blur(14px);display:flex;align-items:center;justify-content:space-between;border-bottom:1px solid rgba(228,231,236,.7)}.sub{font-size:12px;color:var(--muted);margin:0 0 2px}.title{font-size:24px;line-height:1.1;margin:0;font-weight:800}.copy{border:0;border-radius:999px;background:#111827;color:#fff;padding:12px 14px;font-weight:700;font-size:15px}.datebar{display:grid;grid-template-columns:48px 1fr 48px 64px;gap:8px;margin-bottom:12px}.datebar button,.datebar input{height:48px;border:1px solid var(--line);border-radius:16px;background:#fff;font-size:16px;font-weight:700;text-align:center}.datebar input{padding:0 8px;color:var(--text);-webkit-appearance:none}.page{display:none}.page.active{display:block}.stats{display:grid;grid-template-columns:repeat(4,1fr);gap:8px;margin:10px 0 14px}.stat{background:#fff;border:1px solid var(--line);border-radius:18px;padding:12px 8px;text-align:center;box-shadow:0 8px 22px rgba(16,24,40,.05)}.stat span{display:block;font-size:12px;color:var(--muted)}.stat b{font-size:26px;line-height:1.1}.stat.in b{color:var(--green)}.stat.out b{color:var(--red)}.stat.clean b{color:var(--yellow)}.stat.alert b{color:var(--purple)}.grid{display:grid;grid-template-columns:1fr;gap:12px}.menu-card{width:100%;min-height:82px;text-align:left;border:0;border-radius:24px;background:#fff;padding:18px 18px;box-shadow:0 10px 28px rgba(16,24,40,.08);display:flex;justify-content:space-between;gap:14px;align-items:center}.menu-card strong{display:block;font-size:19px;margin-bottom:4px}.menu-card span{font-size:13px;color:var(--muted)}.chev{font-size:28px;color:#98a2b3}.note,.panel,.form,.task,.room-card,.record{background:#fff;border:1px solid var(--line);border-radius:22px;padding:16px;box-shadow:0 8px 22px rgba(16,24,40,.05)}.note{margin-top:14px;color:#344054;font-size:14px}.back{width:100%;height:48px;border:0;border-radius:16px;background:#eaf0ff;color:#1d4ed8;font-size:16px;font-weight:800;margin-bottom:12px}.panel h2,.form h2{font-size:19px;margin:0 0 10px}pre{white-space:pre-wrap;font:600 15px/1.65 -apple-system,BlinkMacSystemFont,"Hiragino Sans";margin:0}.tasks{display:grid;gap:12px;margin-top:12px}.task h3{font-size:17px;margin:0 0 8px}.item{padding:12px;border-radius:16px;background:#f8fafc;margin:8px 0;border-left:5px solid #cbd5e1}.item.in{border-color:var(--green)}.item.out{border-color:var(--red)}.item.clean{border-color:var(--yellow)}.item.alert{border-color:var(--purple);background:#faf5ff}.item b{display:block}.item small{display:block;color:var(--muted);margin-top:2px}.legend{display:flex;gap:8px;flex-wrap:wrap;margin-bottom:12px}.pill{border-radius:999px;background:#fff;border:1px solid var(--line);padding:8px 10px;font-size:13px;font-weight:700}.board{display:grid;gap:10px}.board-row{background:#fff;border:1px solid var(--line);border-radius:18px;padding:13px}.board-top{display:flex;justify-content:space-between;align-items:center;gap:8px}.badges{display:flex;gap:5px;flex-wrap:wrap;margin-top:8px}.badge{font-size:12px;border-radius:999px;padding:5px 8px;color:#fff;font-weight:700}.b-in{background:var(--green)}.b-out{background:var(--red)}.b-clean{background:var(--yellow)}.b-alert{background:var(--purple)}label{display:block;font-size:13px;color:#344054;font-weight:800;margin:12px 0 6px}input,select,textarea{width:100%;height:50px;border:1px solid var(--line);border-radius:16px;background:#fff;padding:0 13px;font-size:16px;color:var(--text)}textarea{height:76px;padding-top:12px}.two{display:grid;grid-template-columns:1fr 1fr;gap:10px}.primary{width:100%;height:54px;border:0;border-radius:18px;background:linear-gradient(135deg,#2563eb,#7c3aed);color:#fff;font-size:17px;font-weight:900;margin-top:14px}.danger{background:#fff1f2;color:#dc2626;border:1px solid #fecdd3;border-radius:12px;padding:8px 10px;font-weight:800}.records{display:grid;gap:10px;margin-top:12px}.record h4,.room-card h4{margin:0 0 6px;font-size:17px}.meta{color:var(--muted);font-size:13px;line-height:1.55}.room-cards{display:grid;gap:10px}.status{display:inline-block;border-radius:999px;padding:5px 9px;font-size:12px;font-weight:800;margin-top:6px}.s-free{background:#dcfce7;color:#166534}.s-busy{background:#dbeafe;color:#1e40af}.s-warn{background:#fef3c7;color:#92400e}.bottom{position:fixed;left:0;right:0;bottom:0;z-index:10;padding:8px 10px calc(8px + var(--safeBottom));background:rgba(255,255,255,.92);backdrop-filter:blur(16px);border-top:1px solid var(--line);display:grid;grid-template-columns:repeat(5,1fr);gap:4px;max-width:480px;margin:0 auto}.tab{border:0;background:transparent;border-radius:16px;padding:7px 0 5px;color:#667085;font-size:21px;font-weight:800}.tab span{display:block;font-size:10px;margin-top:1px}.tab.active{background:#eff6ff;color:#1d4ed8}@media (max-width:360px){.app{padding-left:10px;padding-right:10px}.title{font-size:22px}.stat b{font-size:22px}.datebar{grid-template-columns:42px 1fr 42px 58px}.menu-card strong{font-size:17px}}
</style>
</head>
<body>
<div class="app">
<header class="top"><div><p class="sub">Dorm Management</p><h1 id="pageTitle" class="title">メニュー</h1></div><button class="copy" onclick="copyAI()">コピー</button></header>
<section class="datebar"><button id="prevDay">‹</button><input type="date" id="targetDate"><button id="nextDay">›</button><button id="todayBtn">今日</button></section>
<main>
<section id="menu" class="page active">
 <div class="stats"><div class="stat in"><span>入寮</span><b id="countIn">0</b></div><div class="stat out"><span>退寮</span><b id="countOut">0</b></div><div class="stat clean"><span>清掃</span><b id="countClean">0</b></div><div class="stat alert"><span>注意</span><b id="countAlert">0</b></div></div>
 <div class="grid">
  <button class="menu-card" data-page="today"><div><strong>🤖 本日の状況</strong><span>入寮・退寮・清掃を文章で確認</span></div><div class="chev">›</div></button>
  <button class="menu-card" data-page="board"><div><strong>📅 管理ボード</strong><span>アパート・ビジホを色分け表示</span></div><div class="chev">›</div></button>
  <button class="menu-card" data-page="input"><div><strong>✍ 登録</strong><span>予定をiPhoneから追加</span></div><div class="chev">›</div></button>
  <button class="menu-card" data-page="rooms"><div><strong>🏢 部屋一覧</strong><span>空室・入居中・清掃待ち</span></div><div class="chev">›</div></button>
 </div>
 <div class="note"><b>iPhone用</b><br>Safariで開いて、共有ボタン →「ホーム画面に追加」でアプリのように起動できます。</div>
</section>
<section id="today" class="page"><button class="back" data-page="menu">← メニューへ戻る</button><div class="panel"><h2>本日のAI書き出し</h2><pre id="aiText"></pre></div><div class="tasks"><div class="task"><h3>入寮予定</h3><div id="inList"></div></div><div class="task"><h3>退寮予定</h3><div id="outList"></div></div><div class="task"><h3>清掃予定</h3><div id="cleanList"></div></div><div class="task"><h3>重複注意</h3><div id="alertList"></div></div></div></section>
<section id="board" class="page"><button class="back" data-page="menu">← メニューへ戻る</button><div class="legend"><span class="pill">🟢 入寮</span><span class="pill">🔴 退寮</span><span class="pill">🟡 清掃</span><span class="pill">🟣 重複</span></div><div id="boardList" class="board"></div></section>
<section id="input" class="page"><button class="back" data-page="menu">← メニューへ戻る</button><div class="form"><h2>予定登録</h2><div class="two"><div><label>種別</label><select id="type"><option>アパート</option><option>ビジホ</option><option>その他</option></select></div><div><label>部屋番号</label><input id="room" placeholder="101 / 305"></div></div><label>アパート名・ビジホ名</label><input id="property" placeholder="例：○○ハイツ / ○○ホテル"><label>名前</label><input id="name" placeholder="名前"><div class="two"><div><label>入寮日</label><input type="date" id="moveIn"></div><div><label>退寮日</label><input type="date" id="moveOut"></div></div><label>清掃日</label><input type="date" id="cleaning"><label>メモ</label><textarea id="memo" placeholder="備考・注意事項"></textarea><button id="addBtn" class="primary">登録する</button></div><div id="records" class="records"></div></section>
<section id="rooms" class="page"><button class="back" data-page="menu">← メニューへ戻る</button><div id="roomsList" class="room-cards"></div></section>
</main>
<nav class="bottom"><button class="tab active" data-page="menu">🏠<span>メニュー</span></button><button class="tab" data-page="today">🤖<span>本日</span></button><button class="tab" data-page="board">📅<span>ボード</span></button><button class="tab" data-page="input">✍<span>登録</span></button><button class="tab" data-page="rooms">🏢<span>部屋</span></button></nav>
</div>
<script>
const STORE='dormAppIphoneRecordsV1';
const sample=[
 {type:'アパート',property:'土浦ハイツ',room:'101',name:'山田 太郎',moveIn:'2026-06-16',moveOut:'',cleaning:'',memo:'入寮予定'},
 {type:'アパート',property:'土浦ハイツ',room:'102',name:'佐藤 花子',moveIn:'2026-06-16',moveOut:'',cleaning:'',memo:'入寮予定'},
 {type:'ビジホ',property:'駅前ビジホ',room:'305',name:'鈴木 一郎',moveIn:'2026-06-15',moveOut:'2026-06-16',cleaning:'2026-06-16',memo:'退寮後清掃'},
 {type:'アパート',property:'荒川沖コーポ',room:'202',name:'田中 美咲',moveIn:'2026-06-16',moveOut:'',cleaning:'',memo:'同日入寮注意'},
 {type:'アパート',property:'荒川沖コーポ',room:'202',name:'前入居者',moveIn:'2026-05-01',moveOut:'2026-06-16',cleaning:'2026-06-16',memo:'同日退寮・清掃'}
];
let records=JSON.parse(localStorage.getItem(STORE)||'null')||sample;
const $=id=>document.getElementById(id); const todayISO=()=>new Date(Date.now()-new Date().getTimezoneOffset()*60000).toISOString().slice(0,10);
$('targetDate').value=todayISO();
function fmt(d){if(!d)return ''; const [y,m,day]=d.split('-'); return `${Number(m)}/${Number(day)}`}
function label(r){return `${r.type}｜${r.property||'物件名未入力'} ${r.room||''}号室`}
function dayData(){const d=$('targetDate').value; const ins=records.filter(r=>r.moveIn===d); const outs=records.filter(r=>r.moveOut===d); const cleans=records.filter(r=>r.cleaning===d); const keys={}; [...ins,...outs,...cleans].forEach(r=>{const k=`${r.type}_${r.property}_${r.room}`; keys[k]=(keys[k]||0)+1}); const alerts=records.filter(r=>keys[`${r.type}_${r.property}_${r.room}`]>1 && (r.moveIn===d||r.moveOut===d||r.cleaning===d)); return {d,ins,outs,cleans,alerts}}
function item(r,cls){return `<div class="item ${cls}"><b>${label(r)}</b><small>${r.name||'名前未入力'}　${r.memo||''}</small></div>`}
function empty(){return '<div class="item"><small>予定なし</small></div>'}
function render(){const {d,ins,outs,cleans,alerts}=dayData(); $('countIn').textContent=ins.length; $('countOut').textContent=outs.length; $('countClean').textContent=cleans.length; $('countAlert').textContent=[...new Set(alerts.map(r=>label(r)))].length;
 $('inList').innerHTML=ins.map(r=>item(r,'in')).join('')||empty(); $('outList').innerHTML=outs.map(r=>item(r,'out')).join('')||empty(); $('cleanList').innerHTML=cleans.map(r=>item(r,'clean')).join('')||empty(); $('alertList').innerHTML=alerts.map(r=>item(r,'alert')).join('')||empty();
 const lines=[`${fmt(d)} 本日の寮状況`,'']; if(ins.length){lines.push('【入寮予定】',...ins.map(r=>`${label(r)}　${r.name||''}`),'')} if(outs.length){lines.push('【退寮予定】',...outs.map(r=>`${label(r)}　${r.name||''}`),'')} if(cleans.length){lines.push('【清掃予定】',...cleans.map(r=>`${label(r)}　${r.name||''}`),'')} if(alerts.length){lines.push('【重複注意】',...[...new Set(alerts.map(r=>label(r)))].map(x=>`${x}　同日予定あり`),'')} if(lines.length===2)lines.push('本日の予定はありません。'); $('aiText').textContent=lines.join('\n');
 const dayRows=[...new Map([...ins,...outs,...cleans].map(r=>[label(r),r])).values()]; $('boardList').innerHTML=dayRows.map(r=>{let b=''; if(r.moveIn===d)b+='<span class="badge b-in">入寮</span>'; if(r.moveOut===d)b+='<span class="badge b-out">退寮</span>'; if(r.cleaning===d)b+='<span class="badge b-clean">清掃</span>'; if(alerts.some(a=>label(a)===label(r)))b+='<span class="badge b-alert">重複</span>'; return `<div class="board-row"><div class="board-top"><b>${label(r)}</b><span>${r.name||''}</span></div><div class="badges">${b}</div><div class="meta">${r.memo||''}</div></div>`}).join('')||'<div class="note">本日の表示対象はありません。</div>';
 $('records').innerHTML=records.slice().reverse().map((r,i)=>`<div class="record"><h4>${label(r)}</h4><div class="meta">${r.name||''}<br>入寮 ${fmt(r.moveIn)||'-'} / 退寮 ${fmt(r.moveOut)||'-'} / 清掃 ${fmt(r.cleaning)||'-'}<br>${r.memo||''}</div><button class="danger" onclick="delRec(${records.length-1-i})">削除</button></div>`).join('');
 const latest={}; records.forEach(r=>latest[`${r.type}_${r.property}_${r.room}`]=r); $('roomsList').innerHTML=Object.values(latest).sort((a,b)=>label(a).localeCompare(label(b),'ja')).map(r=>{let st='空室',cls='s-free'; if(r.moveIn && (!r.moveOut || r.moveOut>=d)){st='入居中';cls='s-busy'} if(r.cleaning===d){st='清掃予定';cls='s-warn'} return `<div class="room-card"><h4>${label(r)}</h4><div class="meta">${r.name||''}<br>入寮 ${fmt(r.moveIn)||'-'} / 退寮 ${fmt(r.moveOut)||'-'} / 清掃 ${fmt(r.cleaning)||'-'}</div><span class="status ${cls}">${st}</span></div>`}).join('');
}
function save(){localStorage.setItem(STORE,JSON.stringify(records)); render()}
function show(page){document.querySelectorAll('.page').forEach(p=>p.classList.remove('active')); $(page).classList.add('active'); document.querySelectorAll('.tab').forEach(t=>t.classList.toggle('active',t.dataset.page===page)); $('pageTitle').textContent={menu:'メニュー',today:'本日の状況',board:'管理ボード',input:'登録',rooms:'部屋一覧'}[page]||'寮管理'; window.scrollTo(0,0)}
document.querySelectorAll('[data-page]').forEach(b=>b.addEventListener('click',()=>show(b.dataset.page)));
$('prevDay').onclick=()=>{let d=new Date($('targetDate').value); d.setDate(d.getDate()-1); $('targetDate').value=d.toISOString().slice(0,10); render()};
$('nextDay').onclick=()=>{let d=new Date($('targetDate').value); d.setDate(d.getDate()+1); $('targetDate').value=d.toISOString().slice(0,10); render()}; $('todayBtn').onclick=()=>{$('targetDate').value=todayISO();render()}; $('targetDate').onchange=render;
$('addBtn').onclick=()=>{records.push({type:$('type').value,property:$('property').value.trim(),room:$('room').value.trim(),name:$('name').value.trim(),moveIn:$('moveIn').value,moveOut:$('moveOut').value,cleaning:$('cleaning').value,memo:$('memo').value.trim()}); ['property','room','name','moveIn','moveOut','cleaning','memo'].forEach(id=>$(id).value=''); save(); show('today')};
function delRec(i){if(confirm('この登録を削除しますか？')){records.splice(i,1);save()}}
async function copyAI(){try{await navigator.clipboard.writeText($('aiText').textContent); alert('コピーしました')}catch(e){alert('コピーできませんでした')}}
render(); if('serviceWorker' in navigator){window.addEventListener('load',()=>navigator.serviceWorker.register('./sw.js'))}
</script>
</body></html>
