<!DOCTYPE html>
<html lang="ja">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width,initial-scale=1.0,viewport-fit=cover">
<title>G-SPOT管理システム</title>
<link rel="manifest" href="manifest.json">
<meta name="theme-color" content="#f5f5f7">
<style>
:root{
  --bg:#f5f5f7;--card:#fff;--text:#111827;--sub:#6b7280;--line:#e5e7eb;
  --blue:#007aff;--green:#dff7e8;--greenText:#137333;--orange:#fff1dc;--orangeText:#9a5a00;
  --red:#ffe4e6;--redText:#9f1239;--purple:#eee7ff;--purpleText:#5b21b6;
  --shadow:0 10px 30px rgba(0,0,0,.07);--radius:22px;
}
*{box-sizing:border-box}
body{margin:0;background:var(--bg);color:var(--text);font-family:-apple-system,BlinkMacSystemFont,"Hiragino Sans","Yu Gothic",sans-serif;font-weight:600}
header{position:sticky;top:0;z-index:20;background:rgba(245,245,247,.92);backdrop-filter:blur(18px);border-bottom:1px solid rgba(0,0,0,.06);padding:18px 18px 12px}
h1{font-size:24px;letter-spacing:-.03em;margin:0}
header p{margin:4px 0 0;color:var(--sub);font-size:12px;font-weight:600}
.wrap{max-width:1280px;margin:auto;padding:12px 12px 60px}
.menu{display:flex;gap:8px;overflow-x:auto;padding:2px 0 12px;position:sticky;top:76px;z-index:19;background:var(--bg)}
.menu button{flex:0 0 auto}
button{border:0;border-radius:16px;padding:11px 14px;background:#fff;color:#111827;box-shadow:0 4px 16px rgba(0,0,0,.06);font-weight:800;font-size:14px}
button.active,.primary{background:var(--blue);color:white}.good{background:#16a34a;color:white}.danger{background:#ef4444;color:white}.sub{background:#eef2ff;color:#1d4ed8}
.card{background:var(--card);border:1px solid rgba(0,0,0,.05);border-radius:var(--radius);padding:18px;margin-bottom:14px;box-shadow:var(--shadow)}
h2{font-size:22px;letter-spacing:-.03em;margin:0 0 14px}
h3{font-size:16px;margin:14px 0 8px}
label{display:block;font-size:12px;color:var(--sub);margin:8px 0 5px}
input,select,textarea{width:100%;border:1px solid var(--line);border-radius:16px;padding:13px;font-size:16px;background:#fff;color:#111827;font-weight:650}
textarea{height:300px;font-family:ui-monospace,SFMono-Regular,Menlo,monospace;font-weight:500;line-height:1.55}
.row{display:grid;grid-template-columns:1fr 1fr;gap:10px}.row3{display:grid;grid-template-columns:1fr 1fr 1fr;gap:10px}
.note{font-size:12px;color:var(--sub);line-height:1.5}.hidden{display:none!important}
.stats{display:grid;grid-template-columns:repeat(4,1fr);gap:10px}.stat{background:#f9fafb;border-radius:18px;padding:14px;text-align:center}.stat span{display:block;font-size:12px;color:var(--sub)}.stat b{font-size:28px;letter-spacing:-.03em}
.item{background:#fff;border:1px solid var(--line);border-radius:18px;padding:12px;margin-bottom:10px}
.badge{display:inline-block;border-radius:999px;padding:3px 9px;font-size:11px;margin:2px;background:#f3f4f6;color:#374151}.new{background:#fff7ed;color:#9a3412}.ok{background:var(--green);color:var(--greenText)}.warn{background:var(--orange);color:var(--orangeText)}.ng{background:var(--red);color:var(--redText)}.info{background:#e0f2fe;color:#075985}
.tableWrap{overflow:auto;border:1px solid var(--line);border-radius:18px;background:#fff;max-height:72vh}
table{border-collapse:separate;border-spacing:0;width:max-content;min-width:100%}
th,td{border-right:1px solid var(--line);border-bottom:1px solid var(--line);padding:7px 8px;text-align:center;font-size:12px;white-space:nowrap;vertical-align:middle}
th{background:#fafafa;font-weight:900}.name{position:sticky;left:0;z-index:3;background:#fff!important;text-align:left!important;min-width:96px;font-weight:900}
.sat{background:#eaf3ff!important}.sun,.holiday{background:#fff0f0!important}
.green{background:var(--green)!important;color:var(--greenText);font-weight:900}.orange{background:var(--orange)!important;color:var(--orangeText);font-weight:900}
.vacant{background:#fafafa!important;color:#9ca3af}.occupied{background:#f0fdf4!important;color:#166534;font-weight:900}
.in{background:#e8f5ff!important;color:#075985;font-weight:900}.out{background:#fff1f2!important;color:#9f1239;font-weight:900}.clean{background:#f2ecff!important;color:#5b21b6;font-weight:900}.done{background:#e0f2fe!important;color:#075985;font-weight:900}
.shiftCell{cursor:pointer;min-width:54px;font-size:11px;line-height:1.2}
.editorRow{display:grid;grid-template-columns:80px 1fr 1fr 58px;gap:6px;align-items:end;border-bottom:1px solid var(--line);padding:8px 0}
.grid2{display:grid;grid-template-columns:1fr 1fr;gap:10px}
@media(max-width:760px){
  h1{font-size:22px}.wrap{padding:10px 8px 50px}.card{padding:16px;border-radius:20px}.menu{top:70px}
  .stats{grid-template-columns:repeat(2,1fr)}.row,.row3,.grid2{grid-template-columns:1fr}
  th,td{padding:6px 7px;font-size:12px}.name{min-width:92px}.editorRow{grid-template-columns:72px 1fr 1fr 52px}
}

.modal{position:fixed;inset:0;background:rgba(0,0,0,.28);z-index:99;display:flex;align-items:flex-end;justify-content:center}
.modalBox{background:#fff;width:min(720px,100%);max-height:88vh;overflow:auto;border-radius:26px 26px 0 0;padding:18px;box-shadow:0 -12px 40px rgba(0,0,0,.18)}


.simpleMenu{justify-content:space-between}
.simpleMenu button{min-width:94px;text-align:center}
@media(max-width:760px){
  .simpleMenu{display:grid;grid-template-columns:repeat(5,1fr);gap:6px;overflow:visible}
  .simpleMenu button{min-width:0;padding:9px 6px;font-size:12px}
  .row3{grid-template-columns:1fr 1fr 1fr}
}

.shiftEditCell{cursor:pointer}
.shiftModal{position:fixed;inset:0;background:rgba(0,0,0,.28);z-index:120;display:flex;align-items:flex-end;justify-content:center}
.shiftModalBox{background:#fff;width:min(620px,100%);max-height:84vh;overflow:auto;border-radius:26px 26px 0 0;padding:18px;box-shadow:0 -12px 40px rgba(0,0,0,.18)}

.inlineShiftBox{display:flex;gap:4px;align-items:center;justify-content:center;min-width:122px}
.inlineShiftBox select{width:auto;min-width:52px;padding:4px 6px;border-radius:8px;font-size:12px}
.inlineShiftBox label{display:flex;align-items:center;gap:3px;margin:0;font-size:11px;color:#111827}
.inlineShiftBox input{width:auto}
.shiftCell{min-width:122px}
@media(max-width:760px){.inlineShiftBox{min-width:112px}.inlineShiftBox select{font-size:11px;min-width:48px;padding:4px}.shiftCell{min-width:112px}}


.shiftPopup{position:fixed;inset:0;background:rgba(0,0,0,.28);z-index:200;display:flex;align-items:flex-start;justify-content:center;padding-top:42px}
.shiftPopupBox{background:#fff;width:min(360px,calc(100% - 24px));border-radius:18px;padding:14px;box-shadow:0 16px 50px rgba(0,0,0,.25);border:1px solid #e5e7eb}
.shiftPopupHead{display:flex;justify-content:space-between;align-items:center;margin-bottom:8px}
.shiftPopupHead b{font-size:16px}
.shiftPopupClose{box-shadow:none;background:#f3f4f6;border-radius:999px;padding:4px 10px}
.shiftPopupRow{display:grid;grid-template-columns:1fr 1fr;gap:8px;margin:8px 0}
.shiftPopupBox select,.shiftPopupBox input,.shiftPopupBox textarea{font-size:14px;padding:8px;border-radius:10px}
.shiftPopupBox textarea{height:52px}
.shiftCell{cursor:pointer}

</style>
</head>
<body>
<header>
  <h1>G-SPOT管理システム</h1>
  <p>出勤・寮・清掃・月間表・AI書き出し</p>
</header>
<div class="wrap">
  <div class="menu simpleMenu">
<button id="tab_home" class="active" onclick="showPage('home')">ホーム</button>
<button id="tab_staff" onclick="showPage('staff')">出勤</button>
<button id="tab_dormHub" onclick="showPage('dormHub')">寮</button>
<button id="tab_monthlyHub" onclick="showPage('monthlyHub')">月間表</button>
<button id="tab_ai" onclick="showPage('ai')">AI書き出し</button>
</div>
<section id="home" class="page">
  <div class="card">
    <h2>ホーム</h2>
    <div class="stats">
      <div class="stat"><span>本日出勤</span><b id="statToday">0</b></div>
      <div class="stat"><span>新人</span><b id="statNewbie">0</b></div>
      <div class="stat"><span>入居中</span><b id="statOccupied">0</b></div>
      <div class="stat"><span>空室</span><b id="statVacant">0</b></div>
    </div>
  </div>
  <div class="grid2">
    <button class="primary" onclick="showPage('staff')">出勤登録</button>
    
    <button class="sub" onclick="showPage('dorm')">入寮登録</button>
    <button class="sub" onclick="showPage('vacancy')">空室確認</button>
    <button class="good" onclick="showPage('ai')">AI書き出し</button>
    <button onclick="showPage('backup')">バックアップ</button>
  </div>
  <div class="card"><h2>本日の確認</h2><div id="dashboard"></div></div>
</section>


<section id="dormHub" class="page hidden">
  <div class="card">
    <h2>寮</h2>
    <div class="grid2">
      <button class="primary" onclick="showPage('dorm')">寮管理</button>
      <button class="sub" onclick="showPage('vacancy')">空室</button>
      <button class="sub" onclick="showPage('master')">寮設定</button>
      <button onclick="showPage('home')">ホームへ戻る</button>
    </div>
  </div>
</section>

<section id="monthlyHub" class="page hidden">
  <div class="card">
    <h2>月間表</h2>
    <div class="grid2">
      <button class="primary" onclick="showPage('monthly')">月間表を見る</button>
      
      <button onclick="showPage('home')">ホームへ戻る</button>
    </div>
  </div>
</section>

<section id="staff" class="page hidden">
 <div class="card"><h2>出勤登録</h2>
  <div class="row"><div><label>源氏名</label><input id="name" placeholder="例：いずな"></div><div><label>新人</label><select id="newbie"><option value="0">通常</option><option value="1">新人</option></select></div></div>
  <div class="row"><div><label>開始日</label><input id="start" type="date"></div><div><label>終了日</label><input id="end" type="date"></div></div>
  <div class="row"><div><label>出勤開始</label><select id="timeStart"></select></div><div><label>出勤終了</label><select id="timeEnd"></select></div></div>
  <label>備考</label><textarea id="staffNote" placeholder="出勤に関する備考"></textarea><button class="primary" onclick="addStaff()">登録</button>
 </div>
 <div class="card"><h2>出勤一覧</h2><div id="staffList"></div></div>
</section>

<section id="shiftEdit" class="page hidden">
 <div class="card"><h2>月間表で編集</h2>
  <div class="row"><div><label>スタッフ</label><select id="editStaffSelect" onchange="renderShiftEditor()"></select></div><div><label>開始日</label><input id="editBase" type="date" onchange="renderShiftEditor()"></div></div>
  <div id="shiftEditor"></div>
 </div>
</section>

<section id="master" class="page hidden">
 <div class="card"><h2>寮設定</h2>
  <div class="row"><div><label>寮名</label><input id="masterDormName" placeholder="例：トキワ"></div><div><label>部屋番号</label><input id="masterRoomNo" placeholder="例：103"></div></div>
  <button class="primary" onclick="addDormRoomMaster()">追加</button>
  <h3>一括登録</h3><textarea id="masterImportText" placeholder="トキワ,103&#10;トキワ,106"></textarea><button class="sub" onclick="importMasterText()">一括登録</button>
 </div>
 <div class="card"><h2>登録済み</h2><div id="masterList"></div></div>
</section>

<section id="dorm" class="page hidden">
 <div class="card"><h2>寮管理</h2>
  <div class="row"><div><label>寮名</label><select id="dormSelect" onchange="updateRoomSelect()"></select></div><div><label>部屋番号</label><select id="roomSelect"></select></div></div>
  <div class="row"><div><label>名前</label><input id="residentName" placeholder="例：いずな"></div><div><label>状態</label><select id="roomStatus"><option>入寮中</option><option>空室</option><option>予約</option></select></div></div>
  <div class="row3"><div><label>入寮日</label><input id="moveIn" type="date"></div><div><label>退寮日</label><input id="moveOut" type="date"></div><div><label>清掃日</label><input id="cleanDate" type="date"></div></div>
  <div class="row"><div><label>清掃状態</label><select id="cleanStatus"><option>未清掃</option><option>清掃予定</option><option>清掃済み</option></select></div><div><label>清掃済み日</label><input id="cleanDoneDate" type="date"></div></div>
  <label>備考</label><textarea id="dormNote" placeholder="寮・清掃に関する備考"></textarea><button class="primary" onclick="addDorm()">登録</button>
 </div>
 <div class="card"><h2>寮一覧</h2><div id="dormList"></div></div>
</section>

<section id="vacancy" class="page hidden">
 <div class="card"><h2>空室ダッシュボード</h2><div id="vacancyList"></div></div>
</section>

<section id="monthly" class="page hidden">
 <div class="card"><h2 id="monthTitle">月間出勤</h2>
  <div class="row"><div><label>表示開始日</label><input id="monthBase" type="date" onchange="renderMonthly();renderDormMonthly();"></div><div><label>表示日数</label><select id="daysCount" onchange="renderMonthly();renderDormMonthly();"><option>31</option><option>30</option><option>14</option><option>7</option></select></div></div>
  <p class="note">月間表のセルをタップすると編集できます。</p><p class="note">月間表のセルをタップすると編集できます。</p><div class="tableWrap" id="monthlyTable"></div>
 </div>
 <div class="card"><h2>寮 月間表</h2><div class="tableWrap" id="dormMonthlyTable"></div></div>
</section>

<section id="ai" class="page hidden">
 <div class="card"><h2>AI書き出し</h2>
  <div class="row"><div><label>更新日</label><input id="updateDate" type="date"></div><div><label>日数</label><select id="exportDays"><option>31</option><option>30</option><option>14</option><option>7</option></select></div></div>
  <div class="row"><button class="primary" onclick="generateText()">作成</button><button class="good" onclick="copyText()">コピー</button></div>
  <button class="sub" onclick="sendLine()">LINEで送る</button>
  <textarea id="output"></textarea>
 </div>
</section>

<section id="backup" class="page hidden">
 <div class="card"><h2>バックアップ</h2>
  <button class="good" onclick="exportBackup()">バックアップ作成</button>
  <label>復元</label><input type="file" accept=".json" onchange="importBackup(event)">
  <button class="sub" onclick="showStorageInfo()">保存状態</button>
  <textarea id="storageInfo"></textarea>
 </div>
</section>

</div>

<div id="modal" class="modal hidden">
  <div class="modalBox">
    <h2 id="modalTitle">寮編集</h2>
    <input type="hidden" id="modalDormId">
    <div class="row">
      <div><label>寮名</label><select id="modalDormName" onchange="updateModalRoomSelect()"></select></div>
      <div><label>部屋番号</label><select id="modalRoomNo"></select></div>
    </div>
    <div class="row">
      <div><label>名前</label><input id="modalResident"></div>
      <div><label>状態</label><select id="modalStatus"><option>入寮中</option><option>空室</option><option>予約</option></select></div>
    </div>
    <div class="row3">
      <div><label>入寮日</label><input id="modalMoveIn" type="date"></div>
      <div><label>退寮日</label><input id="modalMoveOut" type="date"></div>
      <div><label>清掃日</label><input id="modalCleanDate" type="date"></div>
    </div>
    <div class="row">
      <div><label>清掃状態</label><select id="modalCleanStatus"><option>未清掃</option><option>清掃予定</option><option>清掃済み</option></select></div>
      <div><label>清掃済み日</label><input id="modalCleanDoneDate" type="date"></div>
    </div>
    <label>備考</label><textarea id="modalNote"></textarea>
    <div class="row3">
      <button class="primary" onclick="saveDormModal()">保存</button>
      <button class="danger" onclick="deleteDormModal()">削除</button>
      <button onclick="closeModal()">閉じる</button>
    </div>
  </div>
</div>

<script>
if("serviceWorker" in navigator){window.addEventListener("load",()=>navigator.serviceWorker.register("./sw.js").catch(()=>{}))}
const holidays={"2026-01-01":"元日","2026-01-12":"成人の日","2026-02-11":"建国記念の日","2026-02-23":"天皇誕生日","2026-03-20":"春分の日","2026-04-29":"昭和の日","2026-05-03":"憲法記念日","2026-05-04":"みどりの日","2026-05-05":"こどもの日","2026-05-06":"振替休日","2026-07-20":"海の日","2026-08-11":"山の日","2026-09-21":"敬老の日","2026-09-22":"国民の休日","2026-09-23":"秋分の日","2026-10-12":"スポーツの日","2026-11-03":"文化の日","2026-11-23":"勤労感謝の日"};
const wds=["日","月","火","水","木","金","土"];
function el(id){return document.getElementById(id)}
function pad(n){return String(n).padStart(2,"0")}
function ymd(d){return d.getFullYear()+"-"+pad(d.getMonth()+1)+"-"+pad(d.getDate())}
function md(d){return (d.getMonth()+1)+"/"+d.getDate()}
function today(){return ymd(new Date())}
function parseDate(s){let a=s.split("-");return new Date(+a[0],+a[1]-1,+a[2])}
function esc(s){return String(s??"").replace(/[&<>"']/g,m=>({"&":"&amp;","<":"&lt;",">":"&gt;","\"":"&quot;","'":"&#39;"}[m]))}
function loadFirst(keys){for(let k of keys){try{let raw=localStorage.getItem(k);if(raw){let v=JSON.parse(raw);if(Array.isArray(v)&&v.length)return v}}catch(e){}}return []}
let staff=loadFirst(["newAppStaffV1","staffDataStable","staffDataUnifiedV1","managementAppDataV4","staffData"]);
let dorms=loadFirst(["newAppDormV1","dormDataStable","dormDataUnifiedV1","dormDataV1","ryokanDormDataV1","dormData"]);
let dormMaster=loadFirst(["dormMasterV1","roomMasterV1"]);

function backupBeforeUpdateOnce(){
  try{
    if(!localStorage.getItem("backup_before_update")){
      localStorage.setItem("backup_before_update", JSON.stringify({
        staff: staff,
        dorms: dorms,
        dormMaster: dormMaster,
        createdAt: new Date().toISOString(),
        version: "before_ver36"
      }));
    }
  }catch(e){}
}

function save(){localStorage.setItem("newAppStaffV1",JSON.stringify(staff));localStorage.setItem("newAppDormV1",JSON.stringify(dorms));localStorage.setItem("dormMasterV1",JSON.stringify(dormMaster));renderStats()}
function dateClass(d){let s=ymd(d);if(holidays[s])return"holiday";if(d.getDay()==0)return"sun";if(d.getDay()==6)return"sat";return""}
function diffHours(a,b){if(!a||!b)return 0;let A=a.split(":"),B=b.split(":");let s=+A[0]*60+(+A[1]||0),e=+B[0]*60+(+B[1]||0);if(e<s)e+=1440;return Math.max(0,(e-s)/60)}
function point(h){if(h<=0)return 0;if(h<=7)return .5;return 1}
function fmt(n){return Number.isInteger(n)?String(n):n.toFixed(1)}
function shortTime(t){if(!t)return"";let [h,m]=t.split(":");h=String(+h);return (m||"00")==="00"?h:h+":"+m}
function shortRange(a,b){return shortTime(a)+"-"+shortTime(b)}
function makeTimeOptions(sel,val){if(!sel)return;sel.innerHTML="";for(let h=0;h<24;h++){for(let m of ["00","30"]){let v=pad(h)+":"+m;let o=document.createElement("option");o.value=v;o.textContent=shortTime(v);sel.appendChild(o)}}if(val)sel.value=val}
function showPage(id){document.querySelectorAll(".page").forEach(p=>p.classList.add("hidden"));document.querySelectorAll(".menu button").forEach(b=>b.classList.remove("active"));el(id).classList.remove("hidden");el("tab_"+id).classList.add("active");if(id==="staff")renderStaff();if(id==="shiftEdit")renderShiftEditor();if(id==="master")renderMaster();if(id==="dorm"){syncMasterFromDorms();renderDorm();updateRoomSelect();updateDormSelect()}if(id==="vacancy")renderVacancy();if(id==="monthly"){renderMonthly();renderDormMonthly()}if(id==="ai"&&!el("updateDate").value)el("updateDate").value=today();renderStats();renderDashboard()}
function init(){backupBeforeUpdateOnce();let d=new Date();["start","monthBase","editBase","updateDate","moveIn","cleanDate","cleanDoneDate"].forEach(id=>{if(el(id))el(id).value=today()});el("end").value=ymd(new Date(d.getFullYear(),d.getMonth(),d.getDate()+30));makeTimeOptions(el("timeStart"),"10:00");makeTimeOptions(el("timeEnd"),"00:00");syncMasterFromDorms();renderEditStaffSelect();renderStaff();renderMaster();renderDorm();renderMonthly();renderDormMonthly();updateDormSelect();renderStats();renderDashboard()}
function occupiedRecord(room,ds){return dorms.find(r=>r.dormName===room.dormName&&r.roomNo===room.roomNo&&r.status!=="空室"&&((r.moveIn&&r.moveOut&&ds>=r.moveIn&&ds<=r.moveOut)||(r.moveIn&&!r.moveOut&&ds>=r.moveIn)||(!r.moveIn&&r.status==="入寮中")))}
function renderStats(){let ds=today();let occ=0,vac=0;syncMasterFromDorms(false);for(let room of dormMaster){occupiedRecord(room,ds)?occ++:vac++}el("statToday").textContent=totals(ds).real;el("statNewbie").textContent=staff.filter(x=>x.newbie).length;el("statOccupied").textContent=occ;el("statVacant").textContent=vac}
function exportBackup(){let backup={staff,dorms,dormMaster,createdAt:new Date().toISOString()};let blob=new Blob([JSON.stringify(backup,null,2)],{type:"application/json"});let a=document.createElement("a");a.href=URL.createObjectURL(blob);a.download="gspot_backup.json";a.click();URL.revokeObjectURL(a.href)}
function importBackup(ev){let file=ev.target.files[0];if(!file)return;let r=new FileReader();r.onload=()=>{try{let d=JSON.parse(r.result);if(Array.isArray(d.staff))staff=d.staff;if(Array.isArray(d.dorms))dorms=d.dorms;if(Array.isArray(d.dormMaster))dormMaster=d.dormMaster;save();init();alert("復元しました")}catch(e){alert("復元できませんでした")}};r.readAsText(file)}

function workFor(p,ds){if(ds<p.start||ds>p.end)return null;let ov=(p.overrides||{})[ds];if(ov&&ov.off)return null;let st=ov&&ov.timeStart?ov.timeStart:p.timeStart;let en=ov&&ov.timeEnd?ov.timeEnd:p.timeEnd;let h=diffHours(st,en);if(h<=0)return null;return{hours:h,point:point(h),timeStart:st,timeEnd:en}}
function totals(ds){let real=0,calc=0,newbies=[];for(let p of staff){let w=workFor(p,ds);if(w){real++;calc+=w.point;if(p.newbie)newbies.push(p.name)}}return{real,calc,newbies}}

  var map={};

    map[key].push(p);

function timeOptionsHtml(selected){

  for(var hh=0;hh<24;hh++){
    ["00","30"].forEach(function(mm){
      var v=String(hh).padStart(2,"0")+":"+mm;
      var label=(mm==="00"?String(hh):String(hh)+":"+mm);
      h+="<option value='"+v+"' "+(v===selected?"selected":"")+">"+label+"</option>";
    });
  }
  return h;
}

function renderMonthly(){
  var base=parseDate(el("monthBase").value||today()),days=Number(el("daysCount").value||31);
  el("monthTitle").textContent=(base.getMonth()+1)+"月出勤";
  var h="<table><thead><tr><th class='name' rowspan='2'>源氏名</th>";
  for(var i=0;i<days;i++){
    var d=new Date(base);d.setDate(base.getDate()+i);
    h+="<th class='"+dateClass(d)+"'>"+d.getDate()+"日</th>";
  }
  h+="</tr><tr>";
  for(i=0;i<days;i++){
    d=new Date(base);d.setDate(base.getDate()+i);
    h+="<th class='"+dateClass(d)+"'>"+wds[d.getDay()]+"</th>";
  }
  h+="</tr></thead><tbody>";

  monthCastGroups().forEach(function(g){
    var isNew=g.list.some(function(p){return p.newbie;});
    h+="<tr><td class='name'>"+esc(g.name)+(isNew?" 🆕":"")+"</td>";
    for(var i=0;i<days;i++){
      var d=new Date(base);d.setDate(base.getDate()+i);
      var ds=ymd(d),hit=monthWorkForGroup(g,ds),cls=dateClass(d);
      if(!hit){
        h+="<td class='"+cls+" shiftCell' onclick='openShiftPopupByName("+JSON.stringify(g.name)+","+JSON.stringify(ds)+")'>休</td>";
      }else{
        var w=hit.work;
        var wc=w.hours>=10?"green":(w.hours<=8?"orange":"");
        h+="<td class='"+cls+" "+wc+" shiftCell' onclick='openShiftPopup("+JSON.stringify(hit.staff.id)+","+JSON.stringify(ds)+")'>"+shortRange(w.timeStart,w.timeEnd)+"</td>";
      }
    }
    h+="</tr>";
  });

  h+="<tr><td class='name'>合計</td>";
  for(i=0;i<days;i++){
    d=new Date(base);d.setDate(base.getDate()+i);
    var t=totals(ymd(d));
    h+="<td class='"+dateClass(d)+"'><b>"+fmt(t.calc)+"</b><br>("+t.real+")</td>";
  }
  h+="</tr></tbody></table>";
  el("monthlyTable").innerHTML=h;
}

  let rows=(dormMaster.length?dormMaster:dorms).slice().sort((a,b)=>(a.dormName+a.roomNo).localeCompare(b.dormName+b.roomNo,'ja'));
  let h="<table><thead><tr><th class='name' rowspan='2'>寮-部屋</th>";
  for(let i=0;i<days;i++){let d=new Date(base);d.setDate(base.getDate()+i);h+=`<th class='${dateClass(d)}'>${d.getDate()}日</th>`}
  h+="</tr><tr>";
  for(let i=0;i<days;i++){let d=new Date(base);d.setDate(base.getDate()+i);h+=`<th class='${dateClass(d)}'>${wds[d.getDay()]}</th>`}
  h+="</tr></thead><tbody>";

  for(let room of rows){
    h+=`<tr><td class='name'>${esc(room.dormName)}-${esc(room.roomNo)}</td>`;
    for(let i=0;i<days;i++){
      let d=new Date(base);d.setDate(base.getDate()+i);
      let ds=ymd(d),txt="",cls=dateClass(d)+" vacant";
      let active=occupiedRecord(room,ds);

      if(active){
        txt=active.residentName||"入居中";
        cls=dateClass(d)+" occupied";
      }else{
        let cleanState=cleanDisplayForRoom(room,ds);
        if(cleanState){txt=cleanState.txt;cls+=cleanState.cls}
      }

      let outs=dorms.filter(r=>r.dormName===room.dormName&&r.roomNo===room.roomNo&&r.moveOut===ds).map(r=>"退:"+r.residentName);
      let ins=dorms.filter(r=>r.dormName===room.dormName&&r.roomNo===room.roomNo&&r.moveIn===ds).map(r=>"入:"+r.residentName);
      let marks=[];
      if(outs.length){marks.push(...outs);cls+=" out"}
      if(ins.length){marks.push(...ins);cls+=" in"}

      for(let r of dorms){
        if(r.dormName===room.dormName&&r.roomNo===room.roomNo){
          if(r.cleanDate===ds && txt!=="未"){marks.push("清");cls+=" clean"}
          if(r.cleanStatus==="清掃済み"&&r.cleanDoneDate===ds && txt!=="済"){marks.push("済");cls+=" done"}
        }
      }

      if(marks.length)txt=marks.join("→");
      h+=`<td class='${cls} dormCell' onclick='openDormModalByText("${esc(room.dormName)}","${esc(room.roomNo)}","${ds}")'>${esc(txt)}</td>`;
    }
    h+="</tr>";
  }
  h+="</tbody></table>";
  el("dormMonthlyTable").innerHTML=h;
}

function openDormModalByText(dn,rn,ds){openDormModal({dormName:dn,roomNo:rn},ds)}
function openDormModal(room,ds){
  let rec=dorms.find(r=>r.dormName===room.dormName&&r.roomNo===room.roomNo&&((r.moveIn&&r.moveOut&&ds>=r.moveIn&&ds<=r.moveOut)||r.moveIn===ds||r.moveOut===ds||r.cleanDate===ds));
  if(rec)openDormModalById(rec.id,ds);else openDormModalNew(room,ds);
}
function openDormModalById(id,focusDate){
  let r=dorms.find(x=>String(x.id)===String(id)); if(!r)return;
  fillModalOptions(r.dormName,r.roomNo);
  el("modalDormId").value=r.id; el("modalTitle").textContent=r.dormName+"-"+r.roomNo+" 編集";
  el("modalResident").value=r.residentName||""; el("modalStatus").value=r.status||"入寮中";
  el("modalMoveIn").value=r.moveIn||focusDate||today(); el("modalMoveOut").value=r.moveOut||"";
  el("modalCleanDate").value=r.cleanDate||focusDate||today(); el("modalCleanStatus").value=r.cleanStatus||"未清掃";
  el("modalCleanDoneDate").value=r.cleanDoneDate||""; el("modalNote").value=r.note||"";
  el("modal").classList.remove("hidden");
}
function openDormModalNew(room,ds){
  fillModalOptions(room.dormName,room.roomNo);
  el("modalDormId").value=""; el("modalTitle").textContent=room.dormName+"-"+room.roomNo+" 新規";
  el("modalResident").value=""; el("modalStatus").value="入寮中";
  el("modalMoveIn").value=ds||today(); el("modalMoveOut").value="";
  el("modalCleanDate").value=ds||today(); el("modalCleanStatus").value="未清掃";
  el("modalCleanDoneDate").value=""; el("modalNote").value="";
  el("modal").classList.remove("hidden");
}
function fillModalOptions(dn,rn){
  let s=el("modalDormName"); s.innerHTML="";
  [...new Set(dormMaster.map(m=>m.dormName))].sort().forEach(n=>{let o=document.createElement("option");o.value=n;o.textContent=n;s.appendChild(o)});
  s.value=dn; updateModalRoomSelect(); el("modalRoomNo").value=rn;
}
function updateModalRoomSelect(){
  let rs=el("modalRoomNo"),dn=el("modalDormName").value; rs.innerHTML="";
  dormMaster.filter(m=>m.dormName===dn).map(m=>m.roomNo).sort((a,b)=>a.localeCompare(b,'ja')).forEach(r=>{let o=document.createElement("option");o.value=r;o.textContent=r+"号室";rs.appendChild(o)});
}
function saveDormModal(){
  let id=el("modalDormId").value; let r=id?dorms.find(x=>String(x.id)===String(id)):null;
  if(!r){r={id:Date.now()};dorms.push(r)}
  r.dormName=el("modalDormName").value; r.roomNo=el("modalRoomNo").value; r.residentName=el("modalResident").value.trim();
  r.status=el("modalStatus").value; r.moveIn=el("modalMoveIn").value; r.moveOut=el("modalMoveOut").value;
  r.cleanDate=el("modalCleanDate").value; r.cleanStatus=el("modalCleanStatus").value; r.cleanDoneDate=el("modalCleanDoneDate").value; r.note=el("modalNote").value;
  save(); closeModal(); renderDorm(); renderDormMonthly(); renderVacancy(); renderStats(); renderDashboard();
}
function deleteDormModal(){
  let id=el("modalDormId").value;
  if(id&&confirm("削除しますか？")){dorms=dorms.filter(x=>String(x.id)!==String(id));save();closeModal();renderDorm();renderDormMonthly();renderVacancy();renderStats();}
}
function closeModal(){el("modal").classList.add("hidden")}

function dormEvents(ds){let ins=[],outs=[],cleans=[],done=[];for(let r of dorms){let label=`${r.dormName}-${r.roomNo} ${r.residentName||""}`.trim();if(r.moveIn===ds)ins.push(label);if(r.moveOut===ds)outs.push(label);if(r.cleanDate===ds)cleans.push(`${r.dormName}-${r.roomNo}`);if(r.cleanStatus==="清掃済み"&&r.cleanDoneDate===ds)done.push(`${r.dormName}-${r.roomNo}`)}return{ins,outs,cleans,done}}
function generateText(){let base=parseDate(el("updateDate").value||today()),days=+el("exportDays").value||31,lines=[md(base)+"更新",""],cur=null;for(let i=0;i<days;i++){let d=new Date(base);d.setDate(base.getDate()+i);if(cur!==d.getMonth()){cur=d.getMonth();if(lines[lines.length-1]!="")lines.push("");lines.push((d.getMonth()+1)+"月")}let t=totals(ymd(d));lines.push(`${d.getDate()}日(${wds[d.getDay()]}) ${fmt(t.calc)}(${t.real})`)}lines.push("","※()内は実人数","※()外は0.5人計算人数");let ev=dormEvents(ymd(base));if(ev.ins.length||ev.outs.length||ev.cleans.length||ev.done.length){lines.push("","【本日の寮予定】");if(ev.ins.length){lines.push("","入寮");ev.ins.forEach(x=>lines.push(x))}if(ev.outs.length){lines.push("","退寮");ev.outs.forEach(x=>lines.push(x))}if(ev.cleans.length){lines.push("","清掃予定");ev.cleans.forEach(x=>lines.push(x))}if(ev.done.length){lines.push("","清掃済み");ev.done.forEach(x=>lines.push(x))}}let ds=ymd(base),groups={"清掃済み":[],"清掃予定":[],"未清掃":[]};syncMasterFromDorms(false);for(let room of dormMaster){if(occupiedRecord(room,ds))continue;let related=dorms.filter(r=>r.dormName===room.dormName&&r.roomNo===room.roomNo).sort((a,b)=>(b.cleanDoneDate||b.cleanDate||"").localeCompare(a.cleanDoneDate||a.cleanDate||""))[0]||{};let st=related.cleanStatus||"未清掃";(groups[st]||(groups[st]=[])).push(room.dormName+"-"+room.roomNo)}lines.push("","【空室情報】");if(groups["清掃済み"].length){lines.push("","🟢 清掃済");groups["清掃済み"].forEach(x=>lines.push(x))}if(groups["清掃予定"].length){lines.push("","🟠 清掃予定");groups["清掃予定"].forEach(x=>lines.push(x))}if(groups["未清掃"].length){lines.push("","🔴 未清掃");groups["未清掃"].forEach(x=>lines.push(x))}el("output").value=lines.join("\n")}
function copyText(){if(!el("output").value)generateText();el("output").select();document.execCommand("copy");alert("コピーしました")}
function sendLine(){if(!el("output").value)generateText();location.href="https://line.me/R/msg/text/?"+encodeURIComponent(el("output").value)}
init();
</script>
